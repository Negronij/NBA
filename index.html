<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NBAngs – Playoff Bracket 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup,
           signInWithEmailAndPassword, createUserWithEmailAndPassword,
           signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const CFG = {
    apiKey:"AIzaSyAY9Byo6XKRTys4zRaMcP57v2hUiLcwxvw",
    authDomain:"nbangs-a10fc.firebaseapp.com",
    databaseURL:"https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId:"nbangs-a10fc",
    storageBucket:"nbangs-a10fc.firebasestorage.app",
    messagingSenderId:"498517184830",
    appId:"1:498517184830:web:c6fb5400a72d89fb8a1c6f"
  };

  const app  = initializeApp(CFG);
  const auth = getAuth(app);
  const db   = getDatabase(app);
  const ADMIN = 'juan.ignacio.negroni@gmail.com';

  // ── FIX: separar el listener de auth del listener de datos ──
  // onAuthStateChanged solo maneja login/logout
  onAuthStateChanged(auth, user => {
    window.FB_USER  = user || null;
    window.IS_ADMIN = user ? user.email === ADMIN : false;
    if (user) {
      showApp(user);
      loadAll(user.uid);
    } else {
      showLogin();
    }
  });

  window.FB = {
    loginEmail : (e,p) => signInWithEmailAndPassword(auth,e,p)
                          .catch(()=>createUserWithEmailAndPassword(auth,e,p))
                          .catch(err=>setAuthErr(err.message)),
    loginGoogle: ()    => signInWithPopup(auth, new GoogleAuthProvider())
                          .catch(err=>setAuthErr(err.message)),
    logout     : ()    => signOut(auth),

    // ── FIX: setShared ahora devuelve la promesa para poder encadenar .then/.catch ──
    setShared  : (k,v) => set(ref(db,`shared/${k}`), v),
    setUser    : (uid,k,v) => set(ref(db,`users/${uid}/${k}`), v),
    getUser    : (uid,k)   => get(ref(db,`users/${uid}/${k}`)).then(s=>s.exists()?s.val():null),

    // ── FIX: onShared devuelve la función unsubscribe de Firebase ──
    onShared   : (k,cb)    => onValue(ref(db,`shared/${k}`), s=>cb(s.exists()?s.val():null)),
    getShared  : (k)       => get(ref(db,`shared/${k}`)).then(s=>s.exists()?s.val():null),
  };
</script>

<style>
:root{
  --bg:#08090d; --bg2:#0f1117; --bg3:#161922; --bg4:#1d2130;
  --bdr:rgba(255,255,255,.07); --bdr2:rgba(255,255,255,.14);
  --gold:#c9a84c; --gold2:#e8c96a; --goldg:linear-gradient(135deg,#e8c96a,#c9a84c);
  --txt:#eef0f5; --txt2:#8892a8; --txt3:#4a5268;
  --east:#1a6bb5; --east2:#3a9de8;
  --west:#b53020; --west2:#e04428;
  --green:#22c55e; --green2:#16a34a;
  --purple:#7c3aed;
  --admin:#e04428;
  --r:10px; --rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}

/* ── LOGIN ── */
#login-scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1c2540 0%,var(--bg) 70%)}
.l-logo{width:76px;height:76px;border-radius:50%;background:var(--goldg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:#000;
  margin-bottom:14px;box-shadow:0 0 50px rgba(201,168,76,.3)}
.l-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;
  letter-spacing:3px;color:var(--gold2)}
.l-sub{font-size:12px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:36px}
.l-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;
  padding:24px;width:100%;max-width:360px}
.l-card h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:.5px;margin-bottom:16px;color:var(--txt2)}
.l-inp{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--rs);
  padding:12px 14px;font-size:15px;color:var(--txt);font-family:'Barlow',sans-serif;
  margin-bottom:10px;outline:none;transition:border-color .2s}
.l-inp:focus{border-color:var(--gold)}
.btn-gold{width:100%;background:var(--goldg);color:#000;border:none;border-radius:var(--rs);
  padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.5px;margin-bottom:10px}
.btn-ghost{width:100%;background:var(--bg3);color:var(--txt);border:1px solid var(--bdr2);
  border-radius:var(--rs);padding:12px;font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0}
.divider span{font-size:12px;color:var(--txt3)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
#auth-err{color:#f87171;font-size:12px;margin-top:8px;min-height:16px}

/* ── APP SHELL ── */
#app-scr{display:none;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:12px 16px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.hdr-logo{width:36px;height:36px;border-radius:50%;background:var(--goldg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:#000;flex-shrink:0}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;line-height:1.1;color:var(--gold2)}
.hdr-sub{font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.av{width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.badge-admin{background:var(--admin);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.btn-out{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--txt3);font-size:11px;font-family:'Barlow Condensed',sans-serif;
  padding:4px 10px}

/* ── MODE BAR ── */
.mode-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);
  overflow-x:auto;scrollbar-width:none}
.mode-bar::-webkit-scrollbar{display:none}
.mt{flex:1;min-width:72px;padding:10px 4px;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none;cursor:pointer}
.mt.act-r1 {color:#4ade80;border-bottom-color:#4ade80;background:rgba(74,222,128,.07)}
.mt.act-r2 {color:#60a5fa;border-bottom-color:#60a5fa;background:rgba(96,165,250,.07)}
.mt.act-r3 {color:#f472b6;border-bottom-color:#f472b6;background:rgba(244,114,182,.07)}
.mt.act-rf {color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(201,168,76,.07)}
.mt.act-admin{color:var(--admin);border-bottom-color:var(--admin);background:rgba(224,68,40,.07)}
.mt.act-pts{color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(201,168,76,.07)}

/* ── CONF TABS ── */
.conf-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none}
.conf-bar::-webkit-scrollbar{display:none}
.ct{flex:1;min-width:80px;padding:10px 8px;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;
  letter-spacing:.5px;color:var(--txt3);border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;user-select:none;cursor:pointer}
.ct.act-e{color:var(--east2);border-bottom-color:var(--east2);background:rgba(58,157,232,.06)}
.ct.act-w{color:var(--west2);border-bottom-color:var(--west2);background:rgba(224,68,40,.06)}
.ct.act-f{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.06)}

/* ── PAGES ── */
.pg{display:none;padding:16px}
.pg.active{display:block}

/* ── BANNERS ── */
.banner{display:flex;align-items:center;gap:10px;border-radius:var(--r);
  padding:10px 14px;margin-bottom:16px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.3px}
.banner-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.bn-admin{background:linear-gradient(135deg,rgba(224,68,40,.18),rgba(224,68,40,.04));
  border:1px solid rgba(224,68,40,.35);color:var(--admin)}
.bn-r1{background:linear-gradient(135deg,rgba(74,222,128,.1),rgba(74,222,128,.02));
  border:1px solid rgba(74,222,128,.25);color:#4ade80}
.bn-r2{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(96,165,250,.02));
  border:1px solid rgba(96,165,250,.3);color:#60a5fa}
.bn-r3{background:linear-gradient(135deg,rgba(244,114,182,.1),rgba(244,114,182,.02));
  border:1px solid rgba(244,114,182,.3);color:#f472b6}
.bn-rf{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.02));
  border:1px solid rgba(201,168,76,.3);color:var(--gold2)}

/* ── SECTION LABELS ── */
.rl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);
  margin:18px 0 10px;padding-left:4px;
  display:flex;align-items:center;gap:8px}
.rl::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── CONF HEADER ── */
.ch{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r);
  margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;
  letter-spacing:1px;text-transform:uppercase}
.ch.east{background:linear-gradient(135deg,rgba(26,107,181,.22),rgba(26,107,181,.04));
  border:1px solid rgba(58,157,232,.2);color:var(--east2)}
.ch.west{background:linear-gradient(135deg,rgba(181,48,32,.22),rgba(181,48,32,.04));
  border:1px solid rgba(224,68,40,.2);color:var(--west2)}
.ch-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── MATCHUP CARDS ── */
.matchup{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;margin-bottom:10px;transition:border-color .15s}
.matchup.done{border-color:var(--bdr2)}

.team-row{display:flex;align-items:center;padding:10px 12px;gap:10px;
  transition:background .15s;min-height:52px}
.team-row:first-child{border-bottom:1px solid var(--bdr)}
.team-row.winner{background:rgba(34,197,94,.1)}
.team-row.winner .seed{background:rgba(34,197,94,.25);color:#9effc0}

.team-tap-area{display:flex;align-items:center;gap:10px;flex:1;
  cursor:pointer;min-width:0;padding:4px 0}
.team-tap-area:active .tname{opacity:.7}

.logo-wrap{width:36px;height:36px;border-radius:50%;background:#fff;
  border:1.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-wrap img{width:44px;height:44px;object-fit:cover}
.logo-ph{width:36px;height:36px;border-radius:50%;background:var(--bg4);
  border:1px dashed var(--bdr2);display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--txt3)}
.seed{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  background:var(--bg4);color:var(--txt3);border-radius:4px;
  padding:2px 5px;min-width:20px;text-align:center;flex-shrink:0}
.seed.editable{border-bottom:1px dashed var(--txt3);cursor:pointer}
.tname{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.empty{color:var(--txt3);font-weight:400;font-size:14px}
.admin-tap{font-size:9px;color:var(--admin);font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.5px;opacity:.8;flex-shrink:0;pointer-events:none}

/* ── WINS CONTROL ── */
.wc{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--rs);overflow:hidden;flex-shrink:0}
.wb{width:34px;height:34px;background:transparent;border:none;color:var(--txt2);
  font-size:20px;display:flex;align-items:center;justify-content:center;line-height:1;
  position:relative;z-index:2}
.wb:active{background:var(--bg4);color:var(--txt)}
.wn{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;
  color:var(--txt);min-width:22px;text-align:center}
.wn.four{color:#5de088}

/* ── SERIES BAR ── */
.sbar{display:flex;align-items:center;justify-content:center;
  padding:5px 12px;gap:6px;background:var(--bg3);
  font-size:11px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif}
.sres{font-size:12px;font-weight:700;color:#5de088;background:rgba(34,197,94,.2);
  padding:2px 8px;border-radius:4px}
.pip-wrap{display:flex;gap:3px}
.pip{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--bdr2)}
.pip.ft{background:#5de088;border-color:#5de088}
.pip.fb{background:#e04428;border-color:#e04428}

/* ── LOCK NOTICE ── */
.lock-notice{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);
  padding:20px;text-align:center;margin-bottom:10px;color:var(--txt3)}
.lock-ico{font-size:24px;margin-bottom:8px}
.lock-notice p{font-size:13px;line-height:1.5}

/* ── LOADING ── */
.loading-state{text-align:center;padding:40px 20px;color:var(--txt3)}
.loading-state .spin{font-size:28px;display:inline-block;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-state p{font-size:13px}

/* ── FINALS ── */
.finals-hero{text-align:center;padding:22px 16px 18px}
.finals-ico{font-size:52px;line-height:1;margin-bottom:8px;
  filter:drop-shadow(0 0 18px rgba(201,168,76,.4))}
.finals-ttl{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold2)}
.finals-sub{font-size:11px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.champ-box{background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.04));
  border:1px solid rgba(201,168,76,.35);border-radius:var(--r);
  padding:16px;text-align:center;margin-bottom:20px}
.champ-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);
  font-family:'Barlow Condensed',sans-serif;font-weight:600;margin-bottom:6px}
.champ-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--txt)}

/* ── SCORE PAGE ── */
#score-area{display:none;padding:16px}
.sc-hero{text-align:center;padding:20px 16px 16px}
.sc-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);
  font-family:'Barlow Condensed',sans-serif;margin-bottom:8px}
.sc-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;
  color:var(--gold2);line-height:1;filter:drop-shadow(0 0 20px rgba(201,168,76,.3))}
.sc-sub{font-size:12px;color:var(--txt3);margin-top:4px}
.sc-legend{display:flex;gap:8px;justify-content:center;margin:14px 0 20px;flex-wrap:wrap}
.lchip{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:600;color:var(--txt2);background:var(--bg2);
  border:1px solid var(--bdr);border-radius:20px;padding:4px 10px}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sc-sec{margin-bottom:24px}
.sc-sec-ttl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);
  margin:0 0 10px;padding-left:4px;display:flex;align-items:center;gap:8px}
.sc-sec-ttl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.scard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden}
.scard-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.scard-ttl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);flex:1}
.pchip{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  padding:2px 10px;border-radius:20px}
.pchip.exact-r1{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.4)}
.pchip.win-r1  {background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.pchip.exact-r2{background:rgba(96,165,250,.2);color:#60a5fa;border:1px solid rgba(96,165,250,.4)}
.pchip.win-r2  {background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.pchip.exact-r3{background:rgba(244,114,182,.2);color:#f472b6;border:1px solid rgba(244,114,182,.4)}
.pchip.win-r3  {background:rgba(244,114,182,.1);color:#f472b6;border:1px solid rgba(244,114,182,.25)}
.pchip.exact-rf{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.pchip.win-rf  {background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
.pchip.miss    {background:rgba(255,255,255,.04);color:var(--txt3);border:1px solid var(--bdr)}
.pchip.pend    {background:rgba(255,255,255,.04);color:var(--txt3);border:1px solid var(--bdr);font-size:10px}
.srow{display:flex;align-items:center;gap:10px;padding:8px 12px}
.srow+.srow{border-top:1px solid var(--bdr)}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);min-width:80px}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--txt);flex:1}
.sval.ok{color:#5de088} .sval.err{color:#ff7070} .sval.na{color:var(--txt3);font-size:12px}

/* ── SAVE TOAST ── */
.toast{position:fixed;bottom:16px;right:16px;z-index:100;
  background:var(--green2);color:#9effc0;font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── OVERLAY (team selector) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--bdr2);
  border-bottom:none;width:100%;max-width:500px;max-height:72vh;display:flex;flex-direction:column}
.sheet-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-hdr{padding:12px 16px 10px;flex-shrink:0}
.sheet-ttl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.sheet-sub{font-size:12px;color:var(--txt3);margin-top:2px}
.sheet-div{height:1px;background:var(--bdr);flex-shrink:0}
.sheet-list{overflow-y:auto;flex:1;padding:8px 0}

// ════════════════════════════════════════════════════════

const LOGO_MAP = {

  PHI:'PHILADELPHIA76ERS',TOR:'TORONTORAPTORS',WAS:'WASHINGTONWIZARDS',
  DAL:'DALLASMAVERICKS',DEN:'DENVERNUGGETS',GSW:'GOLDENSTATEWARRIORS',HOU:'HOUSTONROCKETS',
  LAC:'LACLIPPERS',LAL:'LOSANGELESLAKERS',MEM:'MEMPHISGRIZZLIES',MIN:'MINNESOTATIMBERWOLVES',
  NOP:'NEWORLEANSPELICANS',OKC:'OKLAHOMACITYTHUNDER',PHX:'PHOENIXSUNS',
  POR:'PORTLANDTRAILBLAZERS',SAC:'SACRAMENTOKINGS',SAS:'SANANTONIOSPURS',UTA:'UTAHJAZZ',
};

const PTS = { r1:[4,2], r2:[3,1], r3:[2,1], rf:[1,1] };

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
function mkSlot(){ return {t:[null,null],w:[0,0]}; }

function freshREAL(){
  return {
    east:{
      r1:[mkSlot(),mkSlot(),mkSlot(),mkSlot()],
      r2:[mkSlot(),mkSlot()],
      r3:[mkSlot()],
    },
    west:{
      r1:[mkSlot(),mkSlot(),mkSlot(),mkSlot()],
      r2:[mkSlot(),mkSlot()],
      r3:[mkSlot()],
    },
    finals: mkSlot(),
  };
}

function freshPRED(){
  return {
    east:{r1:[{w:[0,0]},{w:[0,0]},{w:[0,0]},{w:[0,0]}],r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},
    west:{r1:[{w:[0,0]},{w:[0,0]},{w:[0,0]},{w:[0,0]}],r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},
    finals:{w:[0,0]},
  };
}

let REAL = freshREAL();
let PREDS = { r1: freshPRED(), r2: freshPRED(), r3: freshPRED(), rf: freshPRED() };

// ── FIX: flag para saber si ya cargaron los datos del admin ──
let REAL_LOADED = false;

let MODE = 'r1';
let CONF = 'east';
let SEL_CTX  = null;
let SEED_CTX = null;
let saveTimer = null;

// ════════════════════════════════════════════════════════
// AUTH / LOAD
// ════════════════════════════════════════════════════════
function setAuthErr(m){ document.getElementById('auth-err').textContent=m; }

function doEmailLogin(){
  const e=document.getElementById('l-email').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!e||!p){ setAuthErr('Ingresá email y contraseña'); return; }
  window.FB ? window.FB.loginEmail(e,p) : setAuthErr('Firebase no cargó aún');
}

function showLogin(){
  document.getElementById('login-scr').style.display='flex';
  document.getElementById('app-scr').style.display='none';
  // Resetear flags al hacer logout
  REAL_LOADED = false;
}

function showApp(user){
  document.getElementById('login-scr').style.display='none';
  document.getElementById('app-scr').style.display='block';
  const av=document.getElementById('av');

  else av.textContent=(user.displayName||user.email||'?')[0].toUpperCase();

  document.getElementById('mt-admin').style.display=window.IS_ADMIN?'':'none';

// ── FIX: mostrar estado de carga mientras llegan los datos ──
function showLoadingState(){
  ['east','west','finals'].forEach(conf=>{
    const el=document.getElementById('pg-'+conf);
    if(el) el.innerHTML=`<div class="loading-state"><div class="spin">⏳</div><p>Cargando datos...</p></div>`;
  });
}

// ════════════════════════════════════════════════════════
// FIX PRINCIPAL: loadAll con lógica robusta
// ════════════════════════════════════════════════════════
function loadAll(uid){
  const run = () => {
    if(!window.FB){ setTimeout(run, 300); return; }

    // ── 1. Escuchar cambios en adminResults EN TIEMPO REAL ──
    // Esto funciona para TODOS los usuarios (admin y no admin)
    // Firebase onValue dispara inmediatamente con el valor actual
    // y luego cada vez que cambia
    window.FB.onShared('adminResults', d => {
      console.log('[NBAngs] adminResults recibido:', d ? 'con datos' : 'vacío/null');

      if(d && typeof d === 'object'){
        REAL = deepMerge(freshREAL(), d);
        propagateREAL();
      } else {
        // No hay datos del admin todavía — resetear a fresco
        REAL = freshREAL();
      }

      REAL_LOADED = true;

      // Re-renderizar toda la vista con los nuevos datos
      renderAll();
    });

    // ── 2. Cargar predicciones del usuario (lectura única) ──
    const predKeys = ['r1','r2','r3','rf'];
    predKeys.forEach(k => {
      window.FB.getUser(uid, 'pred_' + k).then(d => {
        if(d) PREDS[k] = deepMerge(freshPRED(), d);
        // Renderizar solo si ya llegaron los datos del admin
        if(REAL_LOADED) renderAll();
      }).catch(err => {
        console.error('[NBAngs] Error cargando pred_'+k+':', err);
      });
    });
  };
  run();
}

// ── MERGE PROFUNDO ──
function deepMerge(base, override){
  if(!override) return base;
  const result = deepClone(base);
  function merge(dst, src){
    if(src===null||src===undefined) return;
    if(Array.isArray(dst)&&Array.isArray(src)){
      for(let i=0;i<dst.length&&i<src.length;i++) merge(dst[i],src[i]);
    } else if(typeof dst==='object'&&dst!==null&&typeof src==='object'&&src!==null){
      for(const k of Object.keys(src)){
        if(k in dst && typeof dst[k]==='object'&&dst[k]!==null) merge(dst[k],src[k]);
        else dst[k]=deepClone(src[k]);
      }
    }
  }
  merge(result, override);
  return result;
}

// ════════════════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════════════════
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 800);
}

function doSave(){
  const uid = window.FB_USER?.uid;
  if(!uid || !window.FB) return;

  if(MODE === 'admin'){
    // ── FIX: guardar inmediatamente sin delay, con feedback ──
    window.FB.setShared('adminResults', deepClone(REAL))
      .then(() => {
        console.log('[NBAngs] adminResults guardado en Firebase OK');
        showToast();
      })
      .catch(e => {
        console.error('[NBAngs] Error guardando adminResults:', e);
        alert('Error al guardar: ' + e.message);
      });
  } else {
    window.FB.setUser(uid, 'pred_' + MODE, deepClone(PREDS[MODE]))
      .then(() => showToast())
      .catch(e => console.error('[NBAngs] Error guardando predicción:', e));
  }
}

function showToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function deepClone(x){ return JSON.parse(JSON.stringify(x)); }

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function winner(m){
  if(!m) return null;
  if(m.w[0]===4) return 0;
  if(m.w[1]===4) return 1;
  return null;
}

function propagateREAL(){
  ['east','west'].forEach(c=>{
    const C=REAL[c];
    if(!C) return;
    for(let p=0;p<2;p++){
      const w0=winner(C.r1[p*2]), w1=winner(C.r1[p*2+1]);
      const dst=C.r2[p];
      if(!dst) continue;
      const prev=[dst.t[0]?.id, dst.t[1]?.id];
      dst.t[0]=w0!==null?{...C.r1[p*2].t[w0]}:null;
      dst.t[1]=w1!==null?{...C.r1[p*2+1].t[w1]}:null;
      if(dst.t[0]&&prev[0]!==dst.t[0].id) dst.w[0]=0;
      if(dst.t[1]&&prev[1]!==dst.t[1].id) dst.w[1]=0;
    }
    const w0r=winner(C.r2[0]), w1r=winner(C.r2[1]);
    const d3=C.r3[0];
    if(!d3) return;
    const prev3=[d3.t[0]?.id,d3.t[1]?.id];
    d3.t[0]=w0r!==null?{...C.r2[0].t[w0r]}:null;
    d3.t[1]=w1r!==null?{...C.r2[1].t[w1r]}:null;
    if(d3.t[0]&&prev3[0]!==d3.t[0].id) d3.w[0]=0;
    if(d3.t[1]&&prev3[1]!==d3.t[1].id) d3.w[1]=0;
  });
  const ew=winner(REAL.east?.r3?.[0]);
  const ww=winner(REAL.west?.r3?.[0]);
  const prev=[REAL.finals.t[0]?.id,REAL.finals.t[1]?.id];
  REAL.finals.t[0]=ew!==null?{...REAL.east.r3[0].t[ew]}:null;
  REAL.finals.t[1]=ww!==null?{...REAL.west.r3[0].t[ww]}:null;
  if(REAL.finals.t[0]&&prev[0]!==REAL.finals.t[0].id) REAL.finals.w[0]=0;
  if(REAL.finals.t[1]&&prev[1]!==REAL.finals.t[1].id) REAL.finals.w[1]=0;
}

function getRealMatch(conf,round,idx){
  if(conf==='finals') return REAL.finals;
  return REAL[conf]?.[round]?.[idx]||null;
}

function getPredW(predKey,conf,round,idx){
  const P=PREDS[predKey];
  if(conf==='finals') return P.finals?.w||[0,0];
  return P[conf]?.[round]?.[idx]?.w||[0,0];
}

function setPredW(predKey,conf,round,idx,w){
  const P=PREDS[predKey];
  if(conf==='finals'){ P.finals.w=w; return; }
  if(!P[conf]) P[conf]={};
  if(!P[conf][round]) P[conf][round]=[];
  if(!P[conf][round][idx]) P[conf][round][idx]={w:[0,0]};
  P[conf][round][idx].w=w;
}

function isRealReady(conf,round,idx){
  const m=getRealMatch(conf,round,idx);
  return !!(m&&m.t[0]&&m.t[1]);
}

// ════════════════════════════════════════════════════════
// LOGO HTML
// ════════════════════════════════════════════════════════
function logoHtml(id,size=36){
  if(!id) return `<div class="logo-ph" style="width:${size}px;height:${size}px">?</div>`;
  const base='LOGOS/'+(LOGO_MAP[id]||id);
  const s=Math.round(size*1.3);
  return `<div class="logo-wrap" style="width:${size}px;height:${size}px"><img src="${base}.png" width="${s}" height="${s}" onerror="tryLogoExt(this,'${base}',0)"></div>`;
}

window.tryLogoExt=function(img,base,idx){
  const exts=['jpg','jpeg','webp','svg']; const n=idx+1;
  if(n<exts.length){ img.onerror=()=>tryLogoExt(img,base,n); img.src=base+'.'+exts[n]; }
  else{ img.style.display='none'; const p=document.createElement('div'); p.className='logo-ph'; p.textContent=base.split('/').pop().substring(0,3); img.parentNode.replaceChild(p,img); }
};

// ════════════════════════════════════════════════════════
// SERIES BAR
// ════════════════════════════════════════════════════════
function seriesBar(w0,w1){
  const w=w0===4?0:w1===4?1:null;
  if(w!==null) return `<div class="sbar"><span class="sres">GANA 4-${w===0?w1:w0}</span></div>`;
  if(w0>0||w1>0){
    let h='<div class="sbar"><div class="pip-wrap">';
    for(let i=0;i<4;i++) h+=`<div class="pip${i<w0?' ft':''}"></div>`;
    h+=`</div><span style="font-size:11px;color:var(--txt3)">${w0}-${w1}</span><div class="pip-wrap">`;
    for(let i=0;i<4;i++) h+=`<div class="pip${i<w1?' fb':''}"></div>`;
    return h+'</div></div>';
  }
  return `<div class="sbar" style="display:none"></div>`;
}

// ════════════════════════════════════════════════════════
// BANNER

// ADMIN MATCH CARD
// ════════════════════════════════════════════════════════
function adminMatchHtml(conf,round,idx){
  const m=conf==='finals'?REAL.finals:REAL[conf]?.[round]?.[idx];
  if(!m) return '';
  const w=winner(m);
  const hasBoth=!!(m.t[0]&&m.t[1]);
  const isR1=(round==='r1');

  const rows=[0,1].map(ti=>{
    const team=m.t[ti], wins=m.w[ti], isWin=w===ti;
    const logo=logoHtml(team?.id,34);

    const seedEl=team
      ? `<span class="seed editable" onclick="event.stopPropagation();openSeedEdit('${conf}','${round}',${idx},${ti})">${team.seed||'?'}</span>`
      : `<span class="seed" style="opacity:.3">—</span>`;

    const nameEl=team
      ? `<span class="tname">${team.short}</span>`
      : `<span class="tname empty">${isR1?'Tap para elegir equipo':'Por definir'}</span>`;

    let teamArea;
    if(isR1){
      teamArea=`<div class="team-tap-area" onclick="openTeamSel('${conf}','${round}',${idx},${ti})">
        ${logo}${seedEl}${nameEl}
        <span class="admin-tap">TAP</span>
      </div>`;
    } else {
      teamArea=`<div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
        ${logo}${seedEl}${nameEl}
      </div>`;
    }

    const wctrl=hasBoth
      ? `<div class="wc" onclick="event.stopPropagation()">
          <button class="wb" onclick="adjWins('${conf}','${round}',${idx},${ti},-1,'admin')">−</button>
          <span class="wn${wins===4?' four':''}">${wins}</span>
          <button class="wb" onclick="adjWins('${conf}','${round}',${idx},${ti},1,'admin')">+</button>
        </div>`
      : '';

    return `<div class="team-row${isWin?' winner':''}">${teamArea}${wctrl}</div>`;
  }).join('');

  return `<div class="matchup${w!==null?' done':''}">${rows}${seriesBar(m.w[0],m.w[1])}</div>`;
}

// ════════════════════════════════════════════════════════
// PRED MATCH CARD
// ════════════════════════════════════════════════════════
function predMatchHtml(predKey,conf,round,idx){
  const realM=conf==='finals'?REAL.finals:REAL[conf]?.[round]?.[idx];
  if(!realM) return '';
  const t0=realM.t[0], t1=realM.t[1];
  const hasBoth=!!(t0&&t1);

  const pw=getPredW(predKey,conf,round,idx);
  const w0=pw[0],w1=pw[1];
  const w=w0===4?0:w1===4?1:null;

  const rows=[0,1].map(ti=>{
    const team=ti===0?t0:t1;
    const wins=pw[ti], isWin=w===ti;
    const logo=logoHtml(team?.id,34);
    const seedEl=team?`<span class="seed">${team.seed||''}</span>`:`<span class="seed" style="opacity:.3">—</span>`;
    const nameEl=team?`<span class="tname">${team.short}</span>`:`<span class="tname empty">Por definir</span>`;
    const teamArea=`<div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">${logo}${seedEl}${nameEl}</div>`;
    const wctrl=hasBoth
      ? `<div class="wc" onclick="event.stopPropagation()">
          <button class="wb" onclick="adjWins('${conf}','${round}',${idx},${ti},-1,'${predKey}')">−</button>
          <span class="wn${wins===4?' four':''}">${wins}</span>
          <button class="wb" onclick="adjWins('${conf}','${round}',${idx},${ti},1,'${predKey}')">+</button>
        </div>`
      : '';
    return `<div class="team-row${isWin?' winner':''}">${teamArea}${wctrl}</div>`;
  }).join('');

  return `<div class="matchup${w!==null?' done':''}">${rows}${seriesBar(w0,w1)}</div>`;
}

  document.getElementById('score-area').style.display=isScore?'block':'none';
  document.getElementById('conf-bar').style.display=isScore?'none':'flex';

    document.getElementById('ct-east').style.display='none';
    document.getElementById('ct-west').style.display='none';
    document.getElementById('ct-finals').style.display='';

  } else {
    document.getElementById('ct-east').style.display='';
    document.getElementById('ct-west').style.display='';
    document.getElementById('ct-finals').style.display='';
    if(CONF==='finals') setConf('east');
    else setConf(CONF);

function setConf(c){
  CONF=c;
  ['east','west','finals'].forEach(k=>{
    document.getElementById('pg-'+k).classList.toggle('active',k===c);
    const el=document.getElementById('ct-'+k);
    if(el) el.className='ct'+(k===c?' act-'+k[0]:'');
  });
  renderPage(c);
}

function renderAll(){
  renderPage(CONF);
  if(MODE==='pts') renderScore();
}

function renderPage(conf){
  const el=document.getElementById('pg-'+conf);
  if(!el||!el.classList.contains('active')) return;

  // ── FIX: Si los datos del admin no llegaron aún, mostrar loading ──
  if(!REAL_LOADED && MODE !== 'admin'){
    el.innerHTML=`<div class="loading-state"><div class="spin">⏳</div><p>Cargando datos...</p></div>`;
    return;
  }

  if(conf==='finals'){
    if(MODE==='admin') el.innerHTML=buildAdminFinalsPage();
    else el.innerHTML=buildFinalsPage(MODE);
  } else {
    if(MODE==='admin')   el.innerHTML=buildAdminConfPage(conf);
    else if(MODE==='r1') el.innerHTML=buildR1ConfPage(conf);
    else if(MODE==='r2') el.innerHTML=buildR2ConfPage(conf);
    else if(MODE==='r3') el.innerHTML=buildR3ConfPage(conf);
    else if(MODE==='rf') el.innerHTML='';
    else                 el.innerHTML='';
  }
}

// ════════════════════════════════════════════════════════
// WIN ADJUSTMENT
// ════════════════════════════════════════════════════════
function adjWins(conf,round,idx,ti,delta,mode){
  ti=+ti; delta=+delta;
  if(mode==='admin'){
    const m=conf==='finals'?REAL.finals:REAL[conf]?.[round]?.[idx];
    if(!m) return;
    m.w[ti]=Math.max(0,Math.min(4,m.w[ti]+delta));
    if(m.w[ti]===4) m.w[1-ti]=Math.min(3,m.w[1-ti]);
    propagateREAL();
  } else {
    const pw=getPredW(mode,conf,round,idx).slice();
    pw[ti]=Math.max(0,Math.min(4,pw[ti]+delta));
    if(pw[ti]===4) pw[1-ti]=Math.min(3,pw[1-ti]);
    setPredW(mode,conf,round,idx,pw);
  }
  renderPage(CONF);
  scheduleSave();
}

function openTeamSel(conf,round,idx,slot){
  if(!window.IS_ADMIN) return;
  SEL_CTX={conf,round,idx:+idx,slot:+slot};
  const confFilter=conf==='east'?'East':'West';
  const teams=ALL_TEAMS.filter(t=>t.conf===confFilter);
  document.getElementById('sel-ttl').textContent='Elegir equipo';
  document.getElementById('sel-sub').textContent=conf==='east'?'Conferencia Este':'Conferencia Oeste';
  document.getElementById('sel-list').innerHTML=teams.map(t=>
    `<div class="sh-item" onclick="pickTeam('${t.id}')">
      ${logoHtml(t.id,30)}
      <div><div class="sh-name">${t.name}</div><div class="sh-conf">${t.conf}</div></div>
    </div>`
  ).join('');
  document.getElementById('ov-team').classList.add('open');
}

function pickTeam(id){
  if(!SEL_CTX) return;
  const {conf,round,idx,slot}=SEL_CTX;
  const t=ALL_TEAMS.find(x=>x.id===id);
  if(!t) return;
  const m=REAL[conf][round][idx];
  m.t[slot]={...t, seed: m.t[slot]?.seed||''};
  m.w[slot]=0;
  propagateREAL();
  closeTeamSel();
  renderPage(CONF);
  scheduleSave();
}

function closeTeamSel(){
  document.getElementById('ov-team').classList.remove('open');
  SEL_CTX=null;
}

function saveSeed(){

}

}

// ════════════════════════════════════════════════════════
// SCORING
// ════════════════════════════════════════════════════════
const PRED_COVERS_ROUNDS={
  r1:['r1'],
  r2:['r1','r2'],
  r3:['r1','r2','r3'],
  rf:['finals'],
};
const ROUND_PRED_LAYERS={
  r1:  ['r1'],
  r2:  ['r1','r2'],
  r3:  ['r1','r2','r3'],
  finals:['r1','r2','r3','rf'],
};

function scoreMatch(predKey,conf,round,idx){
  const realM=conf==='finals'?REAL.finals:REAL[conf]?.[round]?.[idx];
  const realW=winner(realM);
  if(realW===null) return {status:'pending',pts:null};
  const pw=getPredW(predKey,conf,round,idx);
  const predW=pw[0]===4?0:pw[1]===4?1:null;
  if(predW===null) return {status:'no_pred',pts:0};
  const realWinnerId=realM.t[realW]?.id;
  const predWinnerId=realM.t[predW]?.id;
  if(realWinnerId!==predWinnerId) return {status:'miss',pts:0};
  const roundPtsKey=(round==='r1')?'r1':(round==='r2')?'r2':(round==='r3')?'r3':'rf';
  const [eP,wP]=PTS[roundPtsKey]||[1,1];
  const realGames=4+realM.w[1-realW];
  const predGames=4+pw[1-predW];
  if(realGames===predGames) return {status:'exact',pts:eP};
  return {status:'winner',pts:wP};
}

function renderScore(){
  const sc=document.getElementById('score-area');
  const allMatches=[];
  ['east','west'].forEach(c=>{
    for(let i=0;i<4;i++) allMatches.push({conf:c,round:'r1',idx:i,label:`${c==='east'?'Este':'Oeste'} R1 #${i+1}`});
    for(let i=0;i<2;i++) allMatches.push({conf:c,round:'r2',idx:i,label:`${c==='east'?'Este':'Oeste'} Semis #${i+1}`});
    allMatches.push({conf:c,round:'r3',idx:0,label:`Final ${c==='east'?'Este':'Oeste'}`});
  });
  allMatches.push({conf:'finals',round:'finals',idx:0,label:'NBA Finals'});

  let total=0;
  const hasAny=allMatches.some(({conf,round,idx})=>{
    const m=conf==='finals'?REAL.finals:REAL[conf]?.[round]?.[idx];
    return winner(m)!==null;
  });

  if(!hasAny){
    sc.innerHTML=`<div class="sc-hero">
      <div class="sc-lbl">TUS PUNTOS</div><div class="sc-num">—</div>
      <div class="sc-sub">Esperando resultados del Administrador</div>
    </div>
    <div style="text-align:center;padding:40px 20px;color:var(--txt3);background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r)">
      <div style="font-size:32px;margin-bottom:12px">📊</div>
      <div>El Administrador aún no cargó resultados</div>
    </div>`;
    return;
  }

  const pLabels={r1:'🟢 Pred R1',r2:'🔵 Pred R2',r3:'🩷 Pred R3',rf:'🏆 Pred Finals'};
  const chipCls={
    exact:{r1:'exact-r1',r2:'exact-r2',r3:'exact-r3',rf:'exact-rf'},
    winner:{r1:'win-r1',r2:'win-r2',r3:'win-r3',rf:'win-rf'},
  };
  const byRound={r1:[],r2:[],r3:[],finals:[]};
  allMatches.forEach(m=>{ byRound[m.round].push(m); });

  let html=`<div class="sc-hero">
    <div class="sc-lbl">TUS PUNTOS TOTALES</div>
    <div class="sc-num" id="sc-total">…</div>
    <div class="sc-sub">Suma de todas las predicciones</div>
  </div>
  <div class="sc-legend">
    <div class="lchip"><div class="ldot" style="background:#4ade80"></div>R1: 4pts exacto / 2pts ganador</div>
    <div class="lchip"><div class="ldot" style="background:#60a5fa"></div>R2: 3pts / 1pt</div>
    <div class="lchip"><div class="ldot" style="background:#f472b6"></div>R3: 2pts / 1pt</div>
    <div class="lchip"><div class="ldot" style="background:var(--gold)"></div>Finals: 1pt</div>
  </div>`;

  const roundLabels={r1:'Primera Ronda',r2:'Semifinal de Conferencia',r3:'Final de Conferencia',finals:'NBA Finals'};
  ['r1','r2','r3','finals'].forEach(round=>{
    const items=byRound[round];
    if(!items.length) return;
    html+=`<div class="sc-sec" style="padding:0 16px"><div class="sc-sec-ttl">${roundLabels[round]}</div>`;
    const predLayers=ROUND_PRED_LAYERS[round];
    items.forEach(({conf,round:r,idx,label})=>{
      const realM=conf==='finals'?REAL.finals:REAL[conf]?.[r]?.[idx];
      const realW=winner(realM);
      const realWName=realW!==null&&realM?.t[realW]?realM.t[realW].short:'—';
      const realGames=realW!==null?`4-${realM.w[1-realW]}`:'';
      let matchTotal=0, pending=false;
      const layerResults=predLayers.map(pk=>{
        if(realW===null){ pending=true; return {pk,status:'pending',pts:null}; }
        const covers=PRED_COVERS_ROUNDS[pk];
        const roundKey=conf==='finals'?'finals':r;
        if(!covers.includes(roundKey)){ return {pk,status:'na',pts:null}; }
        const res=scoreMatch(pk,conf,r,idx);
        if(res.pts) matchTotal+=res.pts;
        return {pk,...res};
      });
      total+=matchTotal;
      const totalChip=pending&&matchTotal===0
        ? `<span class="pchip pend">Pendiente</span>`
        : `<span class="pchip ${matchTotal>0?'exact-r1':'miss'}">${matchTotal>0?'+'+matchTotal+' pts':'0 pts'}</span>`;
      html+=`<div class="scard">
        <div class="scard-hdr"><div class="scard-ttl">${label}</div>${totalChip}</div>
        <div class="srow"><div class="slbl">REAL</div><div class="sval">${realWName} <span style="color:var(--txt3)">${realGames}</span></div></div>`;
      layerResults.forEach(lr=>{
        if(lr.status==='na') return;
        let chip;
        if(lr.status==='pending')    chip=`<span class="pchip pend">Pendiente</span>`;
        else if(lr.status==='exact') chip=`<span class="pchip ${chipCls.exact[lr.pk]}">+${lr.pts}pts · exacto ✓✓</span>`;
        else if(lr.status==='winner')chip=`<span class="pchip ${chipCls.winner[lr.pk]}">+${lr.pts}pt · ganador ✓</span>`;
        else if(lr.status==='miss')  chip=`<span class="pchip miss">Error ✗</span>`;
        else                         chip=`<span class="pchip miss">Sin predicción</span>`;
        html+=`<div class="srow"><div class="slbl">${pLabels[lr.pk]}</div><div class="sval">${chip}</div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  sc.innerHTML=html;
  const numEl=document.getElementById('sc-total');
  if(numEl) numEl.textContent=total;
}

</script>
