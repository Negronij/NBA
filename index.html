<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
           signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAY9Byo6XKRTys4zRaMcP57v2hUiLcwxvw",
    authDomain: "nbangs-a10fc.firebaseapp.com",
    databaseURL: "https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId: "nbangs-a10fc",
    storageBucket: "nbangs-a10fc.firebasestorage.app",
    messagingSenderId: "498517184830",
    appId: "1:498517184830:web:c6fb5400a72d89fb8a1c6f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const ADMIN_EMAIL = 'juan.ignacio.negroni@gmail.com';

  onAuthStateChanged(auth, user => {
    if (user) {
      window._fbUser = user;
      window._isAdmin = (user.email === ADMIN_EMAIL);
      showApp(user);
      loadAll(user.uid);
    } else {
      window._fbUser = null;
      window._isAdmin = false;
      showLogin();
    }
  });

  window._saveUserData = (uid, key, data) => set(ref(db, `users/${uid}/${key}`), data);
  window._loadUserData = (uid, key, cb) => get(ref(db, `users/${uid}/${key}`)).then(s => cb(s.exists() ? s.val() : null)).catch(() => cb(null));
  window._saveShared = (key, data) => set(ref(db, `shared/${key}`), data);
  window._listenShared = (key, cb) => onValue(ref(db, `shared/${key}`), s => cb(s.exists() ? s.val() : null));

  window._loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => showAuthError(e.message));
  window._loginEmail = (email, pass) => signInWithEmailAndPassword(auth, email, pass).catch(() =>
    createUserWithEmailAndPassword(auth, email, pass).catch(e => showAuthError(e.message)));
  window._logout = () => signOut(auth);
</script>

<style>
:root {
  --bg:#0a0c10; --bg2:#111318; --bg3:#181c24; --bg4:#1e2330;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --gold:#c9a84c; --gold2:#e8c96a;
  --text:#f0f2f5; --text2:#8a92a6; --text3:#535c70;
  --east:#1a6bb5; --east2:#2589e0;
  --west:#b5411a; --west2:#e05225;
  --win:#1a7a3c; --win2:#22a050;
  --admin:#7c3aed;
  --r: 10px; --rsm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1a2035 0%,var(--bg) 60%)}
.login-logo{width:72px;height:72px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#000;margin-bottom:16px;box-shadow:0 0 40px rgba(201,168,76,.35)}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.login-sub{font-size:13px;color:var(--text3);letter-spacing:1px;margin-bottom:36px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:360px}
.login-card h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:11px 14px;font-size:15px;color:var(--text);font-family:'Barlow',sans-serif;margin-bottom:10px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--gold)}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--rsm);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;margin-bottom:10px}
.btn-primary:active{background:#b8922e}
.btn-google{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--rsm);padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0}
.divider span{font-size:12px;color:var(--text3)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-error{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:16px}

/* APP */
#app-screen{display:none}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header-logo{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#000;flex-shrink:0}
.header-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;line-height:1}
.header-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.header-user{margin-left:auto;display:flex;align-items:center;gap:8px}

.user-avatar img{width:100%;height:100%;object-fit:cover}
.admin-badge{background:var(--admin);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
.btn-logout{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text3);font-size:11px;font-family:'Barlow Condensed',sans-serif;padding:4px 10px;cursor:pointer}

/* MODE BAR */
.mode-bar{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.mode-bar::-webkit-scrollbar{display:none}
.mbt{flex:1;min-width:80px;padding:9px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.mbt.m-pred1{color:#4ade80;border-bottom-color:#4ade80;background:rgba(74,222,128,.07)}
.mbt.m-pred2{color:#60a5fa;border-bottom-color:#60a5fa;background:rgba(96,165,250,.07)}
.mbt.m-pred3{color:#f472b6;border-bottom-color:#f472b6;background:rgba(244,114,182,.07)}
.mbt.m-predf{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.07)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}

.tab.te{color:var(--east2);border-bottom-color:var(--east2);background:rgba(37,137,224,.06)}
.tab.tw{color:var(--west2);border-bottom-color:var(--west2);background:rgba(224,82,37,.06)}

.page{display:none;padding:16px}
.page.active{display:block}

/* BRACKET COMPONENTS */
.matchup{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.team-row{display:flex;align-items:center;padding:10px 12px;gap:10px;transition:background .15s;min-height:52px}
.team-row:first-child{border-bottom:1px solid var(--border)}
.team-row.winner{background:rgba(26,122,60,.15)}
.team-row.winner .team-name{color:#5de088;font-weight:600}
.tlw{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:50%;overflow:hidden;border:1.5px solid rgba(255,255,255,.18)}
.tl{width:50px;height:50px;object-fit:cover;display:block}
.lph{width:38px;height:38px;border-radius:50%;background:var(--bg4);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text3)}
.seed-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3);border-radius:4px;padding:2px 5px;min-width:20px;text-align:center}
.team-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name.empty{color:var(--text3);font-weight:400}
.wins-control{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden}
.wbtn{width:30px;height:30px;background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wins-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;min-width:22px;text-align:center}
.series-bar{display:flex;align-items:center;justify-content:center;padding:5px 12px;gap:6px;background:var(--bg3);font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif}
.pip-wrap{display:flex;gap:3px}
.pip{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2)}
.pip.ft{background:#5de088;border-color:#5de088}
.pip.fb{background:#e05225;border-color:#e05225}

/* SCORE CARD */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.scard-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg3);border-bottom:1px solid var(--border)}
.pts-chip{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;padding:2px 10px;border-radius:20px}
.pts-chip.exact-r1{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.4)}
.pts-chip.miss{background:rgba(255,255,255,.04);color:var(--text3)}

/* SAVING MODAL */
.save-badge{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--win);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;padding:6px 12px;border-radius:20px;opacity:0;transition:opacity .3s}
.save-badge.show{opacity:1}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sel-sheet{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:500px;max-height:70vh;display:flex;flex-direction:column}
.sel-list{overflow-y:auto;padding:8px 0}
.sel-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}
</style>

<script>
const TEAMS = [
  {id:'BOS',name:'Boston Celtics',short:'Celtics',conf:'East'},
  {id:'NYK',name:'New York Knicks',short:'Knicks',conf:'East'},
  {id:'MIL',name:'Milwaukee Bucks',short:'Bucks',conf:'East'},
  {id:'CLE',name:'Cleveland Cavaliers',short:'Cavaliers',conf:'East'},
  {id:'ORL',name:'Orlando Magic',short:'Magic',conf:'East'},
  {id:'IND',name:'Indiana Pacers',short:'Pacers',conf:'East'},
  {id:'PHI',name:'Philadelphia 76ers',short:'76ers',conf:'East'},
  {id:'MIA',name:'Miami Heat',short:'Heat',conf:'East'},
  {id:'OKC',name:'Oklahoma City Thunder',short:'Thunder',conf:'West'},
  {id:'DEN',name:'Denver Nuggets',short:'Nuggets',conf:'West'},
  {id:'MIN',name:'Minnesota Timberwolves',short:'Timberwolves',conf:'West'},
  {id:'LAC',name:'LA Clippers',short:'Clippers',conf:'West'},
  {id:'DAL',name:'Dallas Mavericks',short:'Mavericks',conf:'West'},
  {id:'PHX',name:'Phoenix Suns',short:'Suns',conf:'West'},
  {id:'LAL',name:'Los Angeles Lakers',short:'Lakers',conf:'West'},
  {id:'NOP',name:'New Orleans Pelicans',short:'Pelicans',conf:'West'},
];

const LOGO_MAP = {
  BOS:'BOSTONCELTICS',NYK:'NEWYORKKNICKS',MIL:'MILWAUKEEBUCKS',CLE:'CLEVELANDCAVALIERS',
  ORL:'ORLANDOMAGIC',IND:'INDIANAPACERS',PHI:'PHILADELPHIA76ERS',MIA:'MIAMIHEAT',
  OKC:'OKLAHOMACITYTHUNDER',DEN:'DENVERNUGGETS',MIN:'MINNESOTATIMBERWOLVES',LAC:'LACLIPPERS',
  DAL:'DALLASMAVERICKS',PHX:'PHOENIXSUNS',LAL:'LOSANGELESLAKERS',NOP:'NEWORLEANSPELICANS',
};

function freshBracket() {
  return {
    east: {
      r1: Array(4).fill(0).map(()=>({t:[null,null], w:[0,0]})),
      r2: Array(2).fill(0).map(()=>({t:[null,null], w:[0,0]})),
      r3: Array(1).fill(0).map(()=>({t:[null,null], w:[0,0]}))
    },
    west: {
      r1: Array(4).fill(0).map(()=>({t:[null,null], w:[0,0]})),
      r2: Array(2).fill(0).map(()=>({t:[null,null], w:[0,0]})),
      r3: Array(1).fill(0).map(()=>({t:[null,null], w:[0,0]}))
    },
    finals: {t:[null,null], w:[0,0]}
  };
}

let REAL = freshBracket();
let PRED = { pred1: freshBracket(), pred2: freshBracket(), pred3: freshBracket(), predf: freshBracket() };
let currentMode = 'pred1', activeTab = 'east', selCtx = null, saveTimer = null;

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('admin-badge').style.display = window._isAdmin ? 'block' : 'none';
}

function propagate(B) {
  ['east', 'west'].forEach(conf => {
    // R1 -> R2
    B[conf].r2.forEach((m, i) => {
      const s1 = B[conf].r1[i*2], s2 = B[conf].r1[i*2+1];
      m.t[0] = s1.w[0] === 4 ? s1.t[0] : (s1.w[1] === 4 ? s1.t[1] : null);
      m.t[1] = s2.w[0] === 4 ? s2.t[0] : (s2.w[1] === 4 ? s2.t[1] : null);
    });
    // R2 -> R3
    B[conf].r3.forEach((m, i) => {
      const s1 = B[conf].r2[0], s2 = B[conf].r2[1];
      m.t[0] = s1.w[0] === 4 ? s1.t[0] : (s1.w[1] === 4 ? s1.t[1] : null);
      m.t[1] = s2.w[0] === 4 ? s2.t[0] : (s2.w[1] === 4 ? s2.t[1] : null);
    });
  });
  // R3 -> Finals
  const eF = B.east.r3[0], wF = B.west.r3[0];
  B.finals.t[0] = eF.w[0] === 4 ? eF.t[0] : (eF.w[1] === 4 ? eF.t[1] : null);
  B.finals.t[1] = wF.w[0] === 4 ? wF.t[0] : (wF.w[1] === 4 ? wF.t[1] : null);
}

function syncTeams() {
  // Pred1 siempre usa equipos de R1 Real
  ['east', 'west'].forEach(c => {
    REAL[c].r1.forEach((m, i) => {
      PRED.pred1[c].r1[i].t = [...m.t];
    });
  });
  propagate(PRED.pred1);

  // Pred2, Pred3 y PredF usan los equipos que REALMENTE han pasado ronda
  ['pred2', 'pred3', 'predf'].forEach(pk => {
    ['east', 'west'].forEach(c => {
      PRED[pk][c].r1 = JSON.parse(JSON.stringify(REAL[c].r1));
      PRED[pk][c].r2 = JSON.parse(JSON.stringify(REAL[c].r2));
      PRED[pk][c].r3 = JSON.parse(JSON.stringify(REAL[c].r3));
    });
    PRED[pk].finals = JSON.parse(JSON.stringify(REAL.finals));
  });
}

function loadAll(uid) {
  window._listenShared('realResults', data => {
    if (data) {
      REAL = data;
      syncTeams();
      rebuildPage();
    }
  });
  ['pred1', 'pred2', 'pred3', 'predf'].forEach(pk => {
    window._loadUserData(uid, pk, data => {
      if (data) {
        // Solo cargamos los "wins" para no sobreescribir los equipos sincronizados
        ['east', 'west'].forEach(c => {
          data[c].r1.forEach((m, i) => PRED[pk][c].r1[i].w = m.w);
          data[c].r2.forEach((m, i) => PRED[pk][c].r2[i].w = m.w);
          data[c].r3.forEach((m, i) => PRED[pk][c].r3[i].w = m.w);
        });
        PRED[pk].finals.w = data.finals.w;
        propagate(PRED[pk]);
        rebuildPage();
      }
    });
  });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (currentMode === 'real' && window._isAdmin) {
      window._saveShared('realResults', REAL);
    } else {
      window._saveUserData(window._fbUser.uid, currentMode, PRED[currentMode]);
    }
    const b = document.getElementById('save-badge');
    b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 2000);
  }, 1000);
}

function adjWins(path, ti, delta) {
  const isReal = currentMode === 'real';
  const B = isReal ? REAL : PRED[currentMode];
  let m;
  if (path === 'finals') m = B.finals;
  else { const [c, r, i] = path.split(':'); m = B[c][r][i]; }

  m.w[ti] = Math.max(0, Math.min(4, m.w[ti] + delta));
  if (m.w[ti] === 4) m.w[1-ti] = Math.min(m.w[1-ti], 3);
  
  propagate(B);
  if (isReal) syncTeams();
  rebuildPage();
  scheduleSave();
}

function logoHtml(id, size=28) {
  if (!id) return `<div class="lph" style="width:${size}px;height:${size}px">?</div>`;
  const slug = LOGO_MAP[id] || id;
  return `<div class="tlw" style="width:${size}px;height:${size}px"><img class="tl" src="LOGOS/${slug}.png" onerror="this.style.display='none'"></div>`;
}

function matchHtml(path, m) {
  const isAdmin = window._isAdmin;
  const canEditWins = (currentMode !== 'real' || isAdmin);
  const canSelectTeam = (currentMode === 'real' && isAdmin && path.includes(':r1:'));
  
  const row = (ti) => {
    const t = m.t[ti], w = m.w[ti], isWinner = (w === 4);
    return `
      <div class="team-row ${isWinner?'winner':''}" ${canSelectTeam?`onclick="openSel('${path}',${ti})"`:''}>
        ${logoHtml(t?.id)}
        <span class="seed-badge">${t?.seed || '-'}</span>
        <span class="team-name ${!t?'empty':''}">${t ? t.short : (canSelectTeam?'Elegir...':'Por definir')}</span>
        ${(m.t[0] && m.t[1] && canEditWins) ? `
          <div class="wins-control" onclick="event.stopPropagation()">
            <button class="wbtn" onclick="adjWins('${path}',${ti},-1)">-</button>
            <span class="wins-num">${w}</span>
            <button class="wbtn" onclick="adjWins('${path}',${ti},1)">+</button>
          </div>
        ` : `<span class="wins-num">${w}</span>`}
      </div>`;
  };

  return `<div class="matchup">${row(0)}${row(1)}</div>`;
}

function rebuildPage() {
  const pg = document.getElementById('pg-' + activeTab);
  if (activeTab === 'finals') {
    pg.innerHTML = `<div class="rl">NBA FINALS</div>` + matchHtml('finals', (currentMode==='real'?REAL:PRED[currentMode]).finals);
    return;
  }
  const B = currentMode === 'real' ? REAL : PRED[currentMode];
  const conf = B[activeTab];
  let h = `<div class="rl">PRIMERA RONDA</div>`;
  conf.r1.forEach((m, i) => h += matchHtml(`${activeTab}:r1:${i}`, m));
  h += `<div class="rl">SEMIFINALES</div>`;
  conf.r2.forEach((m, i) => h += matchHtml(`${activeTab}:r2:${i}`, m));
  h += `<div class="rl">FINALES DE CONF.</div>`;
  h += matchHtml(`${activeTab}:r3:0`, conf.r3[0]);
  pg.innerHTML = h;
}

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.mbt').forEach(b => b.classList.remove('active'));
  document.getElementById('mbt-' + m).classList.add('active');
  document.getElementById('score-container').style.display = m === 'score' ? 'block' : 'none';
  document.getElementById('bracket-area').style.display = m === 'score' ? 'none' : 'block';
  if (m === 'score') renderScore();
  else rebuildPage();
}

function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-' + t).classList.add('active');
  rebuildPage();
}

function openSel(path, ti) {
  selCtx = {path, ti};
  const [conf] = path.split(':');
  const filtered = TEAMS.filter(t => t.conf === (conf==='east'?'East':'West'));
  document.getElementById('sel-list').innerHTML = filtered.map(t => `
    <div class="sel-item" onclick="pickTeam('${t.id}')">
      ${logoHtml(t.id)} <span>${t.name}</span>
    </div>
  `).join('');
  document.getElementById('overlay').classList.add('open');
}

function pickTeam(id) {
  const t = TEAMS.find(x => x.id === id);
  const {path, ti} = selCtx;
  const [conf, rnd, idx] = path.split(':');
  REAL[conf][rnd][idx].t[ti] = {id: t.id, short: t.short, seed: (ti===0?1:8)};
  syncTeams();
  closeOv();
  rebuildPage();
  scheduleSave();
}

function closeOv() { document.getElementById('overlay').classList.remove('open'); }

function handleEmailLogin() {
  const e = document.getElementById('email-input').value;
  const p = document.getElementById('pass-input').value;
  window._loginEmail(e, p);
}

function renderScore() {
  const sc = document.getElementById('score-container');
  sc.innerHTML = `<div style="padding:20px;text-align:center">Puntuación basada en tus predicciones vs Resultados Reales</div>`;
}

// Init
switchMode('pred1');
</script>
</body>
</html>
