<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
           signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAY9Byo6XKRTys4zRaMcP57v2hUiLcwxvw",
    authDomain: "nbangs-a10fc.firebaseapp.com",
    databaseURL: "https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId: "nbangs-a10fc",
    storageBucket: "nbangs-a10fc.firebasestorage.app",
    messagingSenderId: "498517184830",
    appId: "1:498517184830:web:c6fb5400a72d89fb8a1c6f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const ADMIN_EMAIL = 'juan.ignacio.negroni@gmail.com';

  onAuthStateChanged(auth, user => {
    if (user) {
      window._fbUser = user;
      window._isAdmin = (user.email === ADMIN_EMAIL);
      showApp(user);
      loadAll(user.uid);
    } else {
      window._fbUser = null;
      window._isAdmin = false;
      showLogin();
    }
  });

  window._saveUserData = (uid, key, data) => set(ref(db, `users/${uid}/${key}`), data);
  window._loadUserData = (uid, key, cb) => get(ref(db, `users/${uid}/${key}`)).then(s => cb(s.exists() ? s.val() : null)).catch(() => cb(null));
  window._saveShared = (key, data) => set(ref(db, `shared/${key}`), data);
  
  // Real-time listener for Real Results
  window._listenShared = (key, cb) => onValue(ref(db, `shared/${key}`), s => cb(s.exists() ? s.val() : null));

  window._loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => showAuthError(e.message));
  window._loginEmail = (email, pass) => signInWithEmailAndPassword(auth, email, pass).catch(() =>
    createUserWithEmailAndPassword(auth, email, pass).catch(e => showAuthError(e.message)));
  window._logout = () => signOut(auth);
</script>

<style>
:root {
  --bg:#0a0c10; --bg2:#111318; --bg3:#181c24; --bg4:#1e2330;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --gold:#c9a84c; --gold2:#e8c96a;
  --text:#f0f2f5; --text2:#8a92a6; --text3:#535c70;
  --east:#1a6bb5; --east2:#2589e0;
  --west:#b5411a; --west2:#e05225;
  --win:#1a7a3c; --win2:#22a050;
  --admin:#7c3aed;
  --r: 10px; --rsm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1a2035 0%,var(--bg) 60%)}
.login-logo{width:72px;height:72px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#000;margin-bottom:16px;box-shadow:0 0 40px rgba(201,168,76,.35)}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.login-sub{font-size:13px;color:var(--text3);letter-spacing:1px;margin-bottom:36px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:360px}
.login-card h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:11px 14px;font-size:15px;color:var(--text);font-family:'Barlow',sans-serif;margin-bottom:10px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--gold)}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--rsm);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;margin-bottom:10px}
.btn-primary:active{background:#b8922e}
.btn-google{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--rsm);padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0}
.divider span{font-size:12px;color:var(--text3)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-error{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:16px}

/* APP */
#app-screen{display:none}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header-logo{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#000;flex-shrink:0}
.header-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;line-height:1}
.header-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.header-user{margin-left:auto;display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.admin-badge{background:var(--admin);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
.btn-logout{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text3);font-size:11px;font-family:'Barlow Condensed',sans-serif;padding:4px 10px;cursor:pointer}

/* MODE BAR */
.mode-bar{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.mode-bar::-webkit-scrollbar{display:none}
.mbt{flex:1;min-width:80px;padding:9px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.mbt.m-pred1{color:#4ade80;border-bottom-color:#4ade80;background:rgba(74,222,128,.07)}
.mbt.m-pred2{color:#60a5fa;border-bottom-color:#60a5fa;background:rgba(96,165,250,.07)}
.mbt.m-pred3{color:#f472b6;border-bottom-color:#f472b6;background:rgba(244,114,182,.07)}
.mbt.m-predf{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.07)}
.mbt.m-real{color:var(--west2);border-bottom-color:var(--west2);background:rgba(224,82,37,.07)}
.mbt.m-score{color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(232,201,106,.07)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:10px 8px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}

.tab.tw{color:var(--west2);border-bottom-color:var(--west2);background:rgba(224,82,37,.06)}
.tab.tf{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.06)}

.page{display:none;padding:16px}
.page.active{display:block}

/* BRACKET COMPONENTS */
.conf-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif}
.conf-header.east{background:linear-gradient(135deg,rgba(26,107,181,.25),rgba(26,107,181,.05));border:1px solid rgba(37,137,224,.2)}
.conf-header.west{background:linear-gradient(135deg,rgba(181,65,26,.25),rgba(181,65,26,.05));border:1px solid rgba(224,82,37,.2)}
.conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conf-dot.east{background:var(--east2)} .conf-dot.west{background:var(--west2)}
.conf-label{font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase}
.conf-label.east{color:var(--east2)} .conf-label.west{color:var(--west2)}
.rl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-left:4px;display:flex;align-items:center;gap:8px}
.rl::after{content:'';flex:1;height:1px;background:var(--border)}
.matchup{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.matchup.has-winner{border-color:var(--border2)}
.team-row{display:flex;align-items:center;padding:10px 12px;gap:10px;transition:background .15s;min-height:52px}
.team-row:first-child{border-bottom:1px solid var(--border)}
.team-row.tap{cursor:pointer}
.team-row.tap:active{background:var(--bg3)}
.team-row.winner{background:rgba(26,122,60,.15)}
.team-row.winner .team-name{color:#5de088;font-weight:600}
.team-row.winner .seed-badge{background:var(--win);color:#9effc0}
.tlw{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:50%;overflow:hidden;border:1.5px solid rgba(255,255,255,.18)}
.tl{width:50px;height:50px;object-fit:cover;display:block}
.lph{width:38px;height:38px;border-radius:50%;background:var(--bg4);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text3)}
.seed-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3);border-radius:4px;padding:2px 5px;min-width:20px;text-align:center;flex-shrink:0}
.team-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name.empty{color:var(--text3);font-weight:400;font-size:14px}
.wins-control{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden;flex-shrink:0}
.wbtn{width:30px;height:30px;background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding-bottom:1px}
.wbtn:active{background:var(--bg4);color:var(--text)}
.wins-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);min-width:22px;text-align:center}
.wins-num.four{color:#5de088}
.series-bar{display:flex;align-items:center;justify-content:center;padding:5px 12px;gap:6px;background:var(--bg3);font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif}
.series-result{font-size:12px;font-weight:700;color:#5de088;background:rgba(26,122,60,.25);padding:2px 8px;border-radius:4px}
.pip-wrap{display:flex;gap:3px}
.pip{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2)}
.pip.ft{background:#5de088;border-color:#5de088}
.pip.fb{background:#e05225;border-color:#e05225}

.admin-tap-hint{font-size:9px;color:var(--admin);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;opacity:.7}

/* FINALS */
.finals-hero{text-align:center;padding:24px 16px 20px}
.finals-trophy{font-size:52px;margin-bottom:8px;line-height:1;filter:drop-shadow(0 0 20px rgba(201,168,76,.4))}
.finals-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);line-height:1}
.finals-sub{font-size:12px;color:var(--text3);letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.champion-banner{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.35);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:20px}
.champion-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px}
.champion-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800}

/* MODE BANNERS */
.mode-banner{display:flex;align-items:center;gap:10px;border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px}
.mode-banner.real{background:linear-gradient(135deg,rgba(224,82,37,.2),rgba(224,82,37,.05));border:1px solid rgba(224,82,37,.35);color:var(--west2)}
.mode-banner.pred2{background:linear-gradient(135deg,rgba(96,165,250,.15),rgba(96,165,250,.03));border:1px solid rgba(96,165,250,.3);color:#60a5fa}
.mode-banner.pred3{background:linear-gradient(135deg,rgba(244,114,182,.15),rgba(244,114,182,.03));border:1px solid rgba(244,114,182,.3);color:#f472b6}
.mode-banner.predf{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.mode-banner.pred1{background:linear-gradient(135deg,rgba(74,222,128,.1),rgba(74,222,128,.02));border:1px solid rgba(74,222,128,.25);color:#4ade80}
.mbdot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SCORE PAGE */
#score-container{padding:16px}
.score-hero{text-align:center;padding:20px 16px 16px}
.score-total-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'Barlow Condensed',sans-serif;margin-bottom:8px}
.score-total-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:800;color:var(--gold);line-height:1;filter:drop-shadow(0 0 20px rgba(201,168,76,.3))}
.score-total-sub{font-size:12px;color:var(--text3);margin-top:4px}
.score-legend{display:flex;gap:8px;justify-content:center;margin:14px 0 20px;flex-wrap:wrap}
.lchip{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.score-section{margin-bottom:24px}
.score-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:0 0 10px;padding-left:4px;display:flex;align-items:center;gap:8px}
.score-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.scard-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg3);border-bottom:1px solid var(--border)}
.scard-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);flex:1}
.pts-chip{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;padding:2px 10px;border-radius:20px}
.pts-chip.exact-r1{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.4)}
.pts-chip.winner-r1{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.pts-chip.exact-r2{background:rgba(96,165,250,.2);color:#60a5fa;border:1px solid rgba(96,165,250,.4)}
.pts-chip.winner-r2{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.pts-chip.exact-r3{background:rgba(244,114,182,.2);color:#f472b6;border:1px solid rgba(244,114,182,.4)}
.pts-chip.winner-r3{background:rgba(244,114,182,.1);color:#f472b6;border:1px solid rgba(244,114,182,.25)}
.pts-chip.exact-rf{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.pts-chip.winner-rf{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
.pts-chip.miss{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border)}
.pts-chip.pending{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border);font-size:10px}
.srow{display:flex;align-items:center;gap:10px;padding:8px 12px}
.srow+.srow{border-top:1px solid var(--border)}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);min-width:76px}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--text);flex:1}
.sval.correct{color:#5de088}
.sval.wrong{color:#ff7070}
.sval.na{color:var(--text3);font-size:12px}

/* SAVE BADGE */
.save-badge{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--win);color:#9effc0;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none}
.save-badge.show{opacity:1}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sel-sheet{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--border2);border-bottom:none;width:100%;max-width:500px;max-height:70vh;display:flex;flex-direction:column}
.sel-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sel-header{padding:12px 16px 10px;flex-shrink:0}
.sel-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.sel-sub{font-size:12px;color:var(--text3);margin-top:2px}
.sel-div{height:1px;background:var(--border);flex-shrink:0}
.sel-list{overflow-y:auto;flex:1;padding:8px 0}
.sel-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .1s}
.sel-item:active{background:var(--bg3)}
.sel-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600}
.sel-conf{font-size:11px;color:var(--text3);margin-top:1px}
.sel-close{margin:12px 16px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-align:center;cursor:pointer;flex-shrink:0}
.sel-close:active{background:var(--bg4)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">NBA</div>
  <div class="login-title">NBAngs</div>
  <div class="login-sub">PLAYOFF BRACKET · 2024-25</div>
  <div class="login-card">
    <h3>Iniciar sesión</h3>
    <input class="login-input" id="email-input" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="pass-input" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" onclick="handleEmailLogin()">Entrar / Registrarse</button>

const LOGO_MAP = {

  MIA:'MIAMIHEAT',MIL:'MILWAUKEEBUCKS',NYK:'NEWYORKKNICKS',ORL:'ORLANDOMAGIC',
  PHI:'PHILADELPHIA76ERS',TOR:'TORONTORAPTORS',WAS:'WASHINGTONWIZARDS',
  DAL:'DALLASMAVERICKS',DEN:'DENVERNUGGETS',GSW:'GOLDENSTATEWARRIORS',HOU:'HOUSTONROCKETS',
  LAC:'LACLIPPERS',LAL:'LOSANGELESLAKERS',MEM:'MEMPHISGRIZZLIES',MIN:'MINNESOTATIMBERWOLVES',
  NOP:'NEWORLEANSPELICANS',OKC:'OKLAHOMACITYTHUNDER',PHX:'PHOENIXSUNS',POR:'PORTLANDTRAILBLAZERS',
  SAC:'SACRAMENTOKINGS',SAS:'SANANTONIOSPURS',UTA:'UTAHJAZZ',
};

const PTS = { pred1:[4,2], pred2:[3,1], pred3:[2,1], predf:[1,1] };
const ROUND_PRED_COVERS = { r1:['pred1'], r2:['pred1','pred2'], r3:['pred1','pred2','pred3'], finals:['pred1','pred2','pred3','predf'] };
const ROUND_LABELS = {r1:'Primera Ronda',r2:'Semifinal Conf.',r3:'Final Conf.',finals:'NBA Finals'};

function mkTeam(seed,id){
  const t=TEAMS.find(x=>x.id===id);
  return {id,name:t?.name||id,short:t?.short||id,conf:t?.conf||'',seed};
}

function freshBracket(){
  return {
    east:{
      r1:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    west:{
      r1:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    finals:{t:[null,null],w:[0,0]},
  };
}

function freshPartialBracket(){
  return {
    east:{ r2:[{w:[0,0]},{w:[0,0]}], r3:[{w:[0,0]}] },
    west:{ r2:[{w:[0,0]},{w:[0,0]}], r3:[{w:[0,0]}] },
    finals:{w:[0,0]},
  };
}

let REAL = freshBracket();
let PRED = { pred1: freshBracket(), pred2: freshPartialBracket(), pred3: freshPartialBracket(), predf: {finals:{w:[0,0]}} };
let currentMode = 'pred1';
let activeTab   = 'east';
let selCtxG     = null;
let saveTimer   = null;
let builtPages  = {};

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}
function showApp(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const av=document.getElementById('user-avatar');
  if(user.photoURL) av.innerHTML=`<img src="${user.photoURL}">`;
  else av.textContent=(user.displayName||user.email||'?')[0].toUpperCase();
  document.getElementById('admin-badge').style.display=window._isAdmin?'':'none';
}

// CRITICAL: Sync pred1 with REAL teams
function syncPredTeamsWithReal() {
  ['east','west'].forEach(conf => {
    REAL[conf].r1.forEach((m, i) => {
      // Update team definitions in pred1 based on Real R1
      PRED.pred1[conf].r1[i].t[0] = m.t[0] ? {...m.t[0]} : null;
      PRED.pred1[conf].r1[i].t[1] = m.t[1] ? {...m.t[1]} : null;
    });
  });
  propagate(PRED.pred1);
}

function loadAll(uid){
  const tryLoad=()=>{
    if(!window._listenShared){ setTimeout(tryLoad,300); return; }
    
    // Admin definition of teams is shared for everyone
    window._listenShared('realResults', rdata=>{
      if(rdata) {
        REAL = JSON.parse(JSON.stringify(rdata));
        propagate(REAL);
        // Every time REAL teams change, pred1 teams must match for all users
        syncPredTeamsWithReal();
        builtPages = {};
        rebuildPage();
      }
    });

    window._loadUserData(uid,'pred1', d=>{ 
        if(d) {
            let data = JSON.parse(JSON.stringify(d));
            // Keep wins, but refresh teams from current REAL
            PRED.pred1 = data; 
            syncPredTeamsWithReal();
        } 
    });
    window._loadUserData(uid,'pred2', d=>{ if(d) PRED.pred2=JSON.parse(JSON.stringify(d)); });
    window._loadUserData(uid,'pred3', d=>{ if(d) PRED.pred3=JSON.parse(JSON.stringify(d)); });
    window._loadUserData(uid,'predf', d=>{ if(d) PRED.predf=JSON.parse(JSON.stringify(d)); });
  };
  tryLoad();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const uid=window._fbUser?.uid;
    if(!uid) return;
    if(currentMode==='real'){
      window._saveShared('realResults', JSON.parse(JSON.stringify(REAL)));
    } else {
      window._saveUserData(uid,currentMode,JSON.parse(JSON.stringify(PRED[currentMode])));
    }
    const b=document.getElementById('save-badge');
    b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),2000);
  },1200);
}

function handleEmailLogin(){
  const e=document.getElementById('email-input').value.trim();
  const p=document.getElementById('pass-input').value;
  if(!e||!p){ showAuthError('Ingresa email y contraseña'); return; }
  window._loginEmail?window._loginEmail(e,p):showAuthError('Firebase no cargó');
}
function showAuthError(m){ document.getElementById('auth-error').textContent=m; }

function getW(m){
  if(!m) return null;
  if(m.w[0]===4) return 0;
  if(m.w[1]===4) return 1;
  return null;
}

function propagate(B){
  ['east','west'].forEach(conf=>{
    const c=B[conf]; if(!c||!c.r1) return;
    [0,1].forEach(p=>{
      const s0=c.r1[p*2], s1=c.r1[p*2+1], dst=c.r2[p];
      const w0=getW(s0), w1=getW(s1);
      const prev0=dst.t[0]?.id, prev1=dst.t[1]?.id;
      dst.t[0]=w0!==null?{...s0.t[w0]}:null;
      dst.t[1]=w1!==null?{...s1.t[w1]}:null;
      if(dst.t[0]&&prev0!==dst.t[0].id) dst.w[0]=0;
      if(dst.t[1]&&prev1!==dst.t[1].id) dst.w[1]=0;
    });
    const wr0=getW(c.r2[0]), wr1=getW(c.r2[1]), d3=c.r3[0];
    const pp0=d3.t[0]?.id, pp1=d3.t[1]?.id;
    d3.t[0]=wr0!==null?{...c.r2[0].t[wr0]}:null;
    d3.t[1]=wr1!==null?{...c.r2[1].t[wr1]}:null;
    if(d3.t[0]&&pp0!==d3.t[0].id) d3.w[0]=0;
    if(d3.t[1]&&pp1!==d3.t[1].id) d3.w[1]=0;
  });
  const ew=getW(B.east?.r3?.[0]), ww=getW(B.west?.r3?.[0]);
  const prev0=B.finals.t[0]?.id, prev1=B.finals.t[1]?.id;
  B.finals.t[0]=ew!==null?{...B.east.r3[0].t[ew]}:null;
  B.finals.t[1]=ww!==null?{...B.west.r3[0].t[ww]}:null;
  if(B.finals.t[0]&&prev0!==B.finals.t[0].id) B.finals.w[0]=0;
  if(B.finals.t[1]&&prev1!==B.finals.t[1].id) B.finals.w[1]=0;
}

function getRealMatch(path){
  if(path==='finals') return REAL.finals;
  const [conf,rnd,idx]=path.split(':');
  return REAL[conf]?.[rnd]?.[+idx] || null;
}

function getPredWins(predKey, path){
  const P=PRED[predKey]; if(!P) return [0,0];
  if(path==='finals') return P.finals?.w || [0,0];
  const [conf,rnd,idx]=path.split(':');
  return P[conf]?.[rnd]?.[+idx]?.w || [0,0];
}

function setPredWins(predKey, path, w){
  const P=PRED[predKey]; if(!P) return;
  if(path==='finals'){ if(!P.finals) P.finals={w:[0,0]}; P.finals.w=w; return; }
  const [conf,rnd,idx]=path.split(':');
  if(P[conf]?.[rnd]?.[+idx]) P[conf][rnd][+idx].w=w;
}

function logoHtml(id,size){
  if(!id) return `<div class="lph">?</div>`;
  const base='LOGOS/'+(LOGO_MAP[id]||id);
  const s=Math.round(size*1.6);
  return `<div class="tlw" style="width:${size}px;height:${size}px"><img class="tl" src="${base}.png" width="${s}" height="${s}" style="width:${size}px;height:${size}px" onerror="tryExt(this,'${base}',0)"></div>`;
}

function pipsHtml(w0,w1){
  let h='<div class="pip-wrap">'; for(let i=0;i<4;i++) h+=`<div class="pip${i<w0?' ft':''}"></div>`;
  h+=`</div><span style="font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif">${w0}-${w1}</span><div class="pip-wrap">`;
  for(let i=0;i<4;i++) h+=`<div class="pip${i<w1?' fb':''}"></div>`;
  return h+'</div>';
}

function seriesBarHtml(w0,w1){
  const winner=w0===4?0:w1===4?1:null;
  if(winner!==null) return `<div class="series-bar"><span class="series-result">FINAL 4-${winner===0?w1:w0}</span></div>`;
  if(w0>0||w1>0) return `<div class="series-bar">${pipsHtml(w0,w1)}</div>`;
  return `<div class="series-bar" style="display:none"></div>`;
}

function bannerHtml(mode){
  const cfg={
    pred1:{cls:'pred1',txt:'Tu predicción desde R1 — los equipos se actualizan según el Admin'},
    pred2:{cls:'pred2',txt:'Tu predicción desde R2 — equipos reales que pasaron R1'},
    pred3:{cls:'pred3',txt:'Tu predicción desde R3 — Finales de Conferencia'},
    predf:{cls:'predf',txt:'Tu predicción solo para las NBA Finals'},
    real:{cls:'real',txt:'RESULTADOS REALES — solo el admin define equipos y score'},
  };
  const c=cfg[mode]; if(!c) return '';
  return `<div class="mode-banner ${c.cls}"><div class="mbdot"></div>${c.txt}</div>`;
}

function matchHtml(B, path, mode){
  const isAdmin=!!window._isAdmin;
  const isReal=(mode==='real');
  const canEdit=isReal?isAdmin:true; 
  const [conf,rnd,idx]=path==='finals'?['finals','finals','0']:path.split(':');
  const canSelectTeam=isAdmin&&isReal&&rnd==='r1';

  const m=path==='finals'?B.finals:B[conf][rnd][+idx];
  if(!m) return '';
  const w=getW(m);
  const hasBoth=!!(m.t[0]&&m.t[1]);

  const rowHtml=(ti)=>{
    const team=m.t[ti], wins=m.w[ti], isWin=w===ti;
    const tapCls=canSelectTeam?' tap':'';
    const winCls=isWin?' winner':'';
    const tapAttr=canSelectTeam?`onclick="openSel('${path}',${ti})"` :'';
    const logo=team?logoHtml(team.id,28):`<div class="lph">?</div>`;
    const seed=team?`<span class="seed-badge">${team.seed||''}</span>`:`<span class="seed-badge" style="opacity:.4">—</span>`;
    const hint=canSelectTeam?`<span class="admin-tap-hint">TAP</span>`:'';
    const name=team ?`<span class="team-name">${team.short}</span>${hint}` :`<span class="team-name empty">${canSelectTeam?'Elegir equipo':'Por definir'}</span>`;
    const wctrl=(!hasBoth||!canEdit)?'':
      `<div class="wins-control" onclick="event.stopPropagation()">
        <button class="wbtn" onclick="adjWins('${path}',${ti},-1,'${mode}')">−</button>
        <span class="wins-num${wins===4?' four':''}">${wins}</span>
        <button class="wbtn" onclick="adjWins('${path}',${ti},1,'${mode}')">+</button>
      </div>`;
    return `<div class="team-row${winCls}${tapCls}" ${tapAttr}>${logo}${seed}${name}${wctrl}</div>`;
  };
  return `<div class="matchup${w!==null?' has-winner':''}">${rowHtml(0)}${rowHtml(1)}${seriesBarHtml(m.w[0],m.w[1])}</div>`;
}

function partialMatchHtml(predKey, path){
  const realM=getRealMatch(path); if(!realM) return '';
  const t0=realM.t[0], t1=realM.t[1], hasBoth=!!(t0&&t1);
  const pw=getPredWins(predKey,path), w0=pw[0], w1=pw[1], winner=w0===4?0:w1===4?1:null;

  const rowHtml=(ti)=>{
    const team=ti===0?t0:t1;
    const wins=pw[ti], isWin=winner===ti, winCls=isWin?' winner':'';
    const logo=team?logoHtml(team.id,28):`<div class="lph">?</div>`;
    const seed=team?`<span class="seed-badge">${team.seed||''}</span>`:`<span class="seed-badge" style="opacity:.4">—</span>`;
    const name=team ?`<span class="team-name">${team.short}</span>` :`<span class="team-name empty">Por definir</span>`;
    const wctrl=(!hasBoth)?'':
      `<div class="wins-control" onclick="event.stopPropagation()">
        <button class="wbtn" onclick="adjWins('${path}',${ti},-1,'${predKey}')">−</button>
        <span class="wins-num${wins===4?' four':''}">${wins}</span>
        <button class="wbtn" onclick="adjWins('${path}',${ti},1,'${predKey}')">+</button>
      </div>`;
    return `<div class="team-row${winCls}">${logo}${seed}${name}${wctrl}</div>`;
  };
  return `<div class="matchup${winner!==null?' has-winner':''}">${rowHtml(0)}${rowHtml(1)}${seriesBarHtml(w0,w1)}</div>`;
}

function buildConfPage(conf, mode){
  const color=conf==='east'?'east':'west';
  const label=conf==='east'?'Este':'Oeste';
  let h=bannerHtml(mode);
  h+=`<div class="conf-header ${color}"><div class="conf-dot ${color}"></div><div class="conf-label ${color}">Conferencia ${label}</div></div>`;

  if(mode==='pred1'){
    h+=`<div class="rl">Primera Ronda</div>`;
    for(let i=0; i<4; i++) h+=matchHtml(PRED.pred1,`${conf}:r1:${i}`,'pred1');
    h+=`<div class="rl">Semifinal de Conferencia</div>`;
    h+=matchHtml(PRED.pred1,`${conf}:r2:0`,'pred1');
    h+=matchHtml(PRED.pred1,`${conf}:r2:1`,'pred1');
    h+=`<div class="rl">Final de Conferencia</div>`;
    h+=matchHtml(PRED.pred1,`${conf}:r3:0`,'pred1');
  } else if(mode==='pred2'){
    h+=`<div class="rl">Semifinal de Conferencia</div>`;
    h+=partialMatchHtml('pred2',`${conf}:r2:0`);
    h+=partialMatchHtml('pred2',`${conf}:r2:1`);
    h+=`<div class="rl">Final de Conferencia</div>`;
    h+=partialMatchHtml('pred2',`${conf}:r3:0`);
  } else if(mode==='pred3'){
    h+=`<div class="rl">Final de Conferencia</div>`;
    h+=partialMatchHtml('pred3',`${conf}:r3:0`);
  } else if(mode==='real'){
    h+=`<div class="rl">Primera Ronda</div>`;
    for(let i=0;i<4;i++) h+=matchHtml(REAL,`${conf}:r1:${i}`,'real');
    h+=`<div class="rl">Semifinal de Conferencia</div>`;
    h+=matchHtml(REAL,`${conf}:r2:0`,'real');
    h+=matchHtml(REAL,`${conf}:r2:1`,'real');
    h+=`<div class="rl">Final de Conferencia</div>`;
    h+=matchHtml(REAL,`${conf}:r3:0`,'real');
  }
  return h;
}

function buildFinalsPage(mode){
  let h=bannerHtml(mode);
  h+=`<div class="finals-hero"><div class="finals-trophy">🏆</div><div class="finals-title">NBA Finals</div><div class="finals-sub">The Finals · NBA Championship</div></div>`;
  let finalT=null;
  if(mode==='pred1'){ const fw=getW(PRED.pred1.finals); if(fw!==null) finalT=PRED.pred1.finals.t[fw]; }
  else if(['pred2','pred3','predf'].includes(mode)){ const pw=getPredWins(mode,'finals'); const fw=pw[0]===4?0:pw[1]===4?1:null; if(fw!==null) finalT=getRealMatch('finals').t[fw]; }
  else if(mode==='real'){ const fw=getW(REAL.finals); if(fw!==null) finalT=REAL.finals.t[fw]; }

  if(finalT) h+=`<div class="champion-banner"><div class="champion-label">🏆 CAMPEÓN NBA</div><div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">${logoHtml(finalT.id,54)}<div class="champion-name">${finalT.name}</div></div></div>`;
  h+=`<div class="rl">Gran Final</div>`;
  if(mode==='pred1') h+=matchHtml(PRED.pred1,'finals','pred1');
  else if(['pred2','pred3','predf'].includes(mode)) h+=partialMatchHtml(mode,'finals');
  else if(mode==='real') h+=matchHtml(REAL,'finals','real');
  return h;
}

function rebuildPage(){
  const container=document.getElementById('pg-'+activeTab);
  if(activeTab==='finals') container.innerHTML=buildFinalsPage(currentMode);
  else container.innerHTML=buildConfPage(activeTab,currentMode);
}

function switchMode(mode){
  currentMode=mode;
  const labels={pred1:'Predicción desde R1',pred2:'Predicción desde R2',pred3:'Predicción desde R3',predf:'Predicción Finals',real:'Resultados Reales',score:'Mi Puntuación'};
  document.getElementById('mode-label').textContent=labels[mode]||mode;
  ['pred1','pred2','pred3','predf','real','score'].forEach(m=>document.getElementById('mbt-'+m).className='mbt'+(m===mode?' m-'+m:''));
  const isScore=(mode==='score');

  else { ['east','west','finals'].forEach(t=>document.getElementById('tab-'+t).style.display=''); }
  if(isScore){ renderScore(); return; }
  rebuildPage();
}

function showTab(tab){

    document.getElementById('pg-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).className='tab'+(t===tab?' t'+t[0]:'');
  });

}

function adjWins(path, ti, delta, mode){
  ti=+ti;
  if(mode==='real'){
    const m=path==='finals'?REAL.finals:(() => { const [c,r,i]=path.split(':'); return REAL[c][r][+i]; })();
    m.w[ti]=Math.max(0,Math.min(4,m.w[ti]+delta));
    if(m.w[ti]===4) m.w[1-ti]=Math.min(m.w[1-ti],3);
    propagate(REAL);
  } else if(mode==='pred1'){
    const m=path==='finals'?PRED.pred1.finals:(() => { const [c,r,i]=path.split(':'); return PRED.pred1[c][r][+i]; })();
    m.w[ti]=Math.max(0,Math.min(4,m.w[ti]+delta));
    if(m.w[ti]===4) m.w[1-ti]=Math.min(m.w[1-ti],3);
    propagate(PRED.pred1);
  } else {
    const pw=[...getPredWins(mode,path)];
    pw[ti]=Math.max(0,Math.min(4,pw[ti]+delta));
    if(pw[ti]===4) pw[1-ti]=Math.min(pw[1-ti],3);
    setPredWins(mode,path,pw);
  }
  rebuildPage();
  scheduleSave();
}

function openSel(path, ti){

function pickTeam(id){

function closeOv(){ document.getElementById('overlay').classList.remove('open'); selCtxG=null; }

function getAllMatchPaths(){
  const paths=[];
  ['east','west'].forEach(conf=>{
    for(let i=0;i<4;i++) paths.push({path:`${conf}:r1:${i}`,round:'r1',label:`${conf==='east'?'Este':'Oeste'} R1 Serie ${i+1}`});
    for(let i=0;i<2;i++) paths.push({path:`${conf}:r2:${i}`,round:'r2',label:`${conf==='east'?'Este':'Oeste'} Semis ${i+1}`});
    paths.push({path:`${conf}:r3:0`,round:'r3',label:`Final ${conf==='east'?'Este':'Oeste'}`});
  });
  paths.push({path:'finals',round:'finals',label:'NBA Finals'});
  return paths;
}

function scoreForLayer(predKey, path, realM){
  const realW=getW(realM); const [eP, wP]=PTS[predKey];
  let predWinnerId=null, predGames=0;
  if(predKey==='pred1'){
    const pm=path==='finals'?PRED.pred1.finals:(()=>{ const [c,r,i]=path.split(':'); return PRED.pred1[c]?.[r]?.[+i]; })();
    const pw=getW(pm); if(pw===null) return {status:'no_pred',pts:0};
    predWinnerId=pm.t[pw]?.id; predGames=4+pm.w[1-pw];
  } else {
    const pw=getPredWins(predKey,path), w=pw[0]===4?0:pw[1]===4?1:null;
    if(w===null) return {status:'no_pred',pts:0};
    predWinnerId=getRealMatch(path)?.t[w]?.id; predGames=4+pw[1-w];
  }
  if(!predWinnerId) return {status:'no_pred',pts:0};
  if(realW===null) return {status:'pending',pts:null};
  if(realM.t[realW]?.id!==predWinnerId) return {status:'miss',pts:0};
  return (4+realM.w[1-realW]===predGames) ? {status:'exact',pts:eP} : {status:'winner',pts:wP};
}

function renderScore(){
  const allPaths=getAllMatchPaths(); let total=0, bySection={r1:[],r2:[],r3:[],finals:[]};
  allPaths.forEach(({path,round,label})=>{
    const realM=getRealMatch(path), realW=getW(realM), predLayers=ROUND_PRED_COVERS[round];
    let matchTotal=0, matchPending=false, layerResults=[];
    predLayers.forEach(pk=>{
      const r=scoreForLayer(pk,path,realM);
      if(r.status==='pending') matchPending=true; else if(r.pts) matchTotal+=r.pts;
      layerResults.push({pk,...r});
    });
    total+=matchTotal; bySection[round].push({path,label,realM,layerResults,matchTotal,matchPending});
  });
  const hasAny=allPaths.some(({path})=>getW(getRealMatch(path))!==null);
  const sc=document.getElementById('score-container');
  if(!hasAny){ sc.innerHTML=`<div class="score-hero"><div class="score-total-num">—</div><div class="score-total-sub">Esperando resultados reales</div></div>`; return; }
  let h=`<div class="score-hero"><div class="score-total-num">${total}</div><div class="score-total-sub">Puntos Totales</div></div>`;
  ['r1','r2','r3','finals'].forEach(round=>{
    h+=`<div class="score-section"><div class="score-section-title">${ROUND_LABELS[round]}</div>`;
    bySection[round].forEach(it=>{
      const rw=getW(it.realM), rwn=rw!==null?it.realM.t[rw].short:'—', rg=rw!==null?`4-${it.realM.w[1-rw]}`:'';
      h+=`<div class="scard"><div class="scard-header"><div class="scard-title">${it.label}</div><span class="pts-chip ${it.matchTotal>0?'exact-r1':'miss'}">${it.matchTotal} pts</span></div>`;
      h+=`<div class="srow"><div class="slabel">REAL</div><div class="sval">${rwn} ${rg}</div></div></div>`;
    });
    h+=`</div>`;
  });
  sc.innerHTML=h;
}

window.tryExt=function(img,base,idx){
  const exts=['png','jpg','jpeg','webp','svg']; const n=idx+1;
  if(n<exts.length){ img.onerror=()=>tryExt(img,base,n); img.src=base+'.'+exts[n]; }
  else { img.style.display='none'; }
};
