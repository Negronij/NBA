<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBAngs – Playoff Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
           signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─── FIREBASE CONFIG ───────────────────────────────────────────
  // ⚠️  Reemplaza con los datos de tu proyecto NBAngs
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "nbangs-a10fc.firebaseapp.com",
    databaseURL: "https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId: "nbangs-a10fc",
    storageBucket: "nbangs-a10fc.appspot.com",
    messagingSenderId: "498517184830",
    appId: "TU_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  // ─── AUTH LISTENERS ────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      window._fbUser = user;
      showApp(user);
      loadBracket(user.uid);
    } else {
      window._fbUser = null;
      showLogin();
    }
  });

  // ─── SAVE / LOAD ───────────────────────────────────────────────
  window._saveBracket = function(uid, state) {
    set(ref(db, 'brackets/' + uid), state);
  };

  window._loadBracket = function(uid, cb) {
    get(ref(db, 'brackets/' + uid)).then(snap => {
      if (snap.exists()) cb(snap.val());
      else cb(null);
    }).catch(() => cb(null));
  };

  // ─── LOGIN ACTIONS ─────────────────────────────────────────────
  window._loginGoogle = function() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(e => showAuthError(e.message));
  };

  window._loginEmail = function(email, pass) {
    signInWithEmailAndPassword(auth, email, pass)
      .catch(() => {
        createUserWithEmailAndPassword(auth, email, pass)
          .catch(e => showAuthError(e.message));
      });
  };

  window._logout = function() {
    signOut(auth);
  };
</script>

<style>

    --bg2: #111318;
    --bg3: #181c24;
    --bg4: #1e2330;
    --border: rgba(255,255,255,0.08);

    --gold2: #e8c96a;
    --text: #f0f2f5;
    --text2: #8a92a6;
    --text3: #535c70;
    --east: #1a6bb5;
    --east2: #2589e0;
    --west: #b5411a;
    --west2: #e05225;

  .btn-primary {

  }
  .btn-primary:active { background: #b8922e; }
  .btn-google {
    width: 100%;
    background: var(--bg3);

  .header {

  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 90px; padding: 12px 8px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 0.5px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; user-select: none; }

  .matchup.has-winner { border-color: var(--border2); }

  .team-row { display: flex; align-items: center; padding: 10px 12px; gap: 10px; position: relative; transition: background 0.15s; min-height: 52px; }
  .team-row:first-child { border-bottom: 1px solid var(--border); }

  .team-name { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .wins-num { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); min-width: 22px; text-align: center; }

  .series-bar { display: flex; align-items: center; justify-content: center; padding: 5px 12px; gap: 6px; background: var(--bg3); font-size: 11px; color: var(--text3); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }

  .pip.filled-top { background: #5de088; border-color: #5de088; }
  .pip.filled-bot { background: #e05225; border-color: #e05225; }

  .finals-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); line-height: 1; }

  .champion-name { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); }
  .locked-notice { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }

  /* OVERLAY */

  .selector-close-btn:active { background: var(--bg4); }
</style>
</head>

<script>

  {id:'PHX',name:'Phoenix Suns',short:'Suns',conf:'West'},
  {id:'POR',name:'Portland Trail Blazers',short:'Trail Blazers',conf:'West'},
  {id:'SAC',name:'Sacramento Kings',short:'Kings',conf:'West'},
  {id:'SAS',name:'San Antonio Spurs',short:'Spurs',conf:'West'},
  {id:'UTA',name:'Utah Jazz',short:'Jazz',conf:'West'},
];

const LOGO_MAP = {
  'ATL':'ATLANTAHAWKS','BOS':'BOSTONCELTICS','BKN':'BROOKLYNNETS','CHA':'CHARLOTTEHORNETS',
  'CHI':'CHICAGOBULLS','CLE':'CLEVELANDCAVALIERS','DET':'DETROITPISTONS','IND':'INDIANAPACERS',
  'MIA':'MIAMIHEAT','MIL':'MILWAUKEEBUCKS','NYK':'NEWYORKKNICKS','ORL':'ORLANDOMAGIC',
  'PHI':'PHILADELPHIA76ERS','TOR':'TORONTORAPTORS','WAS':'WASHINGTONWIZARDS',
  'DAL':'DALLASMAVERICKS','DEN':'DENVERNUGGETS','GSW':'GOLDENSTATEWARRIORS','HOU':'HOUSTONROCKETS',
  'LAC':'LACLIPPERS','LAL':'LOSANGELESLAKERS','MEM':'MEMPHISGRIZZLIES','MIN':'MINNESOTATIMBERWOLVES',
  'NOP':'NEWORLEANSPELICANS','OKC':'OKLAHOMACITYTHUNDER','PHX':'PHOENIXSUNS','POR':'PORTLANDTRAILBLAZERS',
  'SAC':'SACRAMENTOKINGS','SAS':'SANANTONIOSPURS','UTA':'UTAHJAZZ',
};

function makeTeam(seed, id) {
  const t = TEAMS.find(x => x.id === id);
  return { id, name: t.name, short: t.short, conf: t.conf, seed };
}

// ─── BRACKET STRUCTURE ──────────────────────────────────────────────
// R1: 1v8, 4v5, 2v7, 3v6
// R2: winner(1v8) vs winner(4v5),  winner(2v7) vs winner(3v6)
// Indices r1: [0]=1v8, [1]=4v5, [2]=2v7, [3]=3v6
// r2: [0] = winner r1[0] vs winner r1[1],  [1] = winner r1[2] vs winner r1[3]
function defaultState() {
  return {
    east: {
      r1: [
        {t:[makeTeam(1,'BOS'), makeTeam(8,'MIA')], w:[0,0]},  // 1 vs 8
        {t:[makeTeam(4,'CLE'), makeTeam(5,'ORL')], w:[0,0]},  // 4 vs 5
        {t:[makeTeam(2,'NYK'), makeTeam(7,'PHI')], w:[0,0]},  // 2 vs 7
        {t:[makeTeam(3,'MIL'), makeTeam(6,'IND')], w:[0,0]},  // 3 vs 6
      ],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    west: {
      r1:[
        {t:[makeTeam(1,'OKC'), makeTeam(8,'NOP')], w:[0,0]},  // 1 vs 8
        {t:[makeTeam(4,'LAC'), makeTeam(5,'DAL')], w:[0,0]},  // 4 vs 5
        {t:[makeTeam(2,'DEN'), makeTeam(7,'LAL')], w:[0,0]},  // 2 vs 7
        {t:[makeTeam(3,'MIN'), makeTeam(6,'PHX')], w:[0,0]},  // 3 vs 6
      ],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    finals:{t:[null,null],w:[0,0]},
    activePage:'east',
  };
}

let S = defaultState();
let selCtx = null;
let saveTimer = null;

// ─── AUTH / APP FLOW ─────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const av = document.getElementById('user-avatar');
  if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}">`;
  else av.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
}

function loadBracket(uid) {
  if (window._loadBracket) {
    window._loadBracket(uid, data => {
      if (data) {
        try { S = JSON.parse(JSON.stringify(data)); } catch(e) {}
      }
      pagesBuilt = {east:false,west:false,finals:false};
      propagate();
      ensurePageBuilt('east');
      renderAll();
    });
  } else {
    // Firebase not loaded yet, retry
    setTimeout(() => loadBracket(uid), 300);
  }
}

function scheduleSave() {
  if (!window._fbUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (window._saveBracket) {
      window._saveBracket(window._fbUser.uid, JSON.parse(JSON.stringify(S)));
      const badge = document.getElementById('save-badge');
      badge.classList.add('show');
      setTimeout(() => badge.classList.remove('show'), 2000);
    }
  }, 1200);
}

function handleEmailLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pass  = document.getElementById('pass-input').value;
  if (!email || !pass) { showAuthError('Ingresa email y contraseña'); return; }
  if (window._loginEmail) window._loginEmail(email, pass);
  else showAuthError('Firebase no cargó. Revisa tu conexión.');
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

// ─── BRACKET LOGIC ────────────────────────────────────────────────────
function getWinner(match) {
  if (match.w[0] === 4) return 0;
  if (match.w[1] === 4) return 1;
  return null;
}

function propagate() {
  ['east','west'].forEach(conf => {
    const c = S[conf];
    // R1 -> R2
    // Pair 0: r1[0] (1v8) vs r1[1] (4v5)  → r2[0]
    // Pair 1: r1[2] (2v7) vs r1[3] (3v6)  → r2[1]
    [0,1].forEach(p => {
      const s0 = c.r1[p*2], s1 = c.r1[p*2+1];
      const w0 = getWinner(s0), w1 = getWinner(s1);
      const dst = c.r2[p];
      const prev0 = dst.t[0] ? dst.t[0].id : null;
      const prev1 = dst.t[1] ? dst.t[1].id : null;
      dst.t[0] = w0 !== null ? {...s0.t[w0]} : null;
      dst.t[1] = w1 !== null ? {...s1.t[w1]} : null;
      if (dst.t[0] && prev0 !== dst.t[0].id) dst.w[0] = 0;
      if (dst.t[1] && prev1 !== dst.t[1].id) dst.w[1] = 0;
    });
    // R2 -> R3
    const wr0 = getWinner(c.r2[0]), wr1 = getWinner(c.r2[1]);
    const d3 = c.r3[0];
    const pp0 = d3.t[0] ? d3.t[0].id : null, pp1 = d3.t[1] ? d3.t[1].id : null;
    d3.t[0] = wr0 !== null ? {...c.r2[0].t[wr0]} : null;
    d3.t[1] = wr1 !== null ? {...c.r2[1].t[wr1]} : null;
    if (d3.t[0] && pp0 !== d3.t[0].id) d3.w[0] = 0;
    if (d3.t[1] && pp1 !== d3.t[1].id) d3.w[1] = 0;
  });

  // R3 -> Finals
  const ew = getWinner(S.east.r3[0]), ww = getWinner(S.west.r3[0]);
  const prev0 = S.finals.t[0] ? S.finals.t[0].id : null;
  const prev1 = S.finals.t[1] ? S.finals.t[1].id : null;
  S.finals.t[0] = ew !== null ? {...S.east.r3[0].t[ew]} : null;
  S.finals.t[1] = ww !== null ? {...S.west.r3[0].t[ww]} : null;
  if (S.finals.t[0] && prev0 !== S.finals.t[0].id) S.finals.w[0] = 0;
  if (S.finals.t[1] && prev1 !== S.finals.t[1].id) S.finals.w[1] = 0;
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────
function matchKey(path) { return 'match-' + path.replace(/:/g,'-'); }
function rowKey(path,ti) { return matchKey(path)+'-r'+ti; }

function pipsHtml(w0,w1) {
  let h='<div class="pip-wrap">';
  for(let i=0;i<4;i++) h+=`<div class="pip${i<w0?' filled-top':''}"></div>`;
  h+='</div>';
  h+=`<span style="font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif">${w0}-${w1}</span>`;
  h+='<div class="pip-wrap">';
  for(let i=0;i<4;i++) h+=`<div class="pip${i<w1?' filled-bot':''}"></div>`;
  h+='</div>';
  return h;
}

function logoWrapHtml(id, size) {
  if(!id) return `<div class="logo-placeholder">?</div>`;
  const base='LOGOS/'+LOGO_MAP[id];
  const imgSize=Math.round(size*1.6);
  return `<div class="team-logo-wrap" data-logoid="${id}" style="width:${size}px;height:${size}px">
    <img class="team-logo" src="${base}.png" width="${imgSize}" height="${imgSize}"
      style="width:${imgSize}px;height:${imgSize}px;object-fit:cover;display:block"
      onerror="tryNextExt(this,'${base}',0)">
  </div>`;
}

function buildRowHtml(team, ti, path, canSelect, wins, isWin, hasTeams) {
  const winCls = isWin ? ' winner' : '';
  const tapCls = canSelect ? ' tappable' : '';
  const tapAttr = canSelect ? `onclick="openSelector('${path}',${ti})"` : '';
  const logo = team ? logoWrapHtml(team.id, 28) : `<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
  const seedHtml = team ? `<span class="seed-badge">${team.seed||''}</span>` : `<span class="seed-badge" style="opacity:.4">—</span>`;
  const nameHtml = team ? `<span class="team-name">${team.short}</span>` : `<span class="team-name empty">${canSelect?'Elegir':'Por definir'}</span>`;
  const winsHtml = !hasTeams ? '' :
    `<div class="wins-control" onclick="event.stopPropagation()">
      <button class="wbtn" onclick="setWins('${path}',${ti},-1)">−</button>
      <span class="wins-num${wins===4?' four':''}">${wins}</span>
      <button class="wbtn" onclick="setWins('${path}',${ti},1)">+</button>
    </div>`;
  return `<div class="team-row${winCls}${tapCls}" data-rowkey="${rowKey(path,ti)}" ${tapAttr}>${logo}${seedHtml}${nameHtml}${winsHtml}</div>`;
}

function buildMatchHtml(match, path, canSelect) {
  const w = getWinner(match);
  const hasTeams = !!(match.t[0] && match.t[1]);
  const r0 = buildRowHtml(match.t[0],0,path,canSelect,match.w[0],w===0,hasTeams);
  const r1 = buildRowHtml(match.t[1],1,path,canSelect,match.w[1],w===1,hasTeams);
  let bar = '';
  if(w !== null) bar=`<div class="series-bar" data-bar="${path}"><span class="series-result">FINAL 4-${match.w[1-w]}</span></div>`;
  else if(hasTeams && (match.w[0]>0||match.w[1]>0)) bar=`<div class="series-bar" data-bar="${path}">${pipsHtml(match.w[0],match.w[1])}</div>`;
  else bar=`<div class="series-bar" data-bar="${path}" style="display:none"></div>`;
  return `<div class="matchup${w!==null?' has-winner':''}" data-matchkey="${matchKey(path)}">${r0}${r1}${bar}</div>`;
}

// Helper: R2 subtitle labels
function r2Label(conf, idx) {
  // [0] = ganador (1v8) vs ganador (4v5)
  // [1] = ganador (2v7) vs ganador (3v6)
  const pairs = [[1,8,4,5],[2,7,3,6]];
  const p = pairs[idx];
  return `Ganador ${p[0]}vs${p[1]} — Ganador ${p[2]}vs${p[3]}`;
}

function buildConfHtml(conf) {
  const c = S[conf];
  const color = conf === 'east' ? 'east' : 'west';
  const label = conf === 'east' ? 'Este' : 'Oeste';
  let h = `<div class="conf-header ${color}">
    <div class="conf-dot ${color}"></div>
    <div class="conf-label ${color}">Conferencia ${label}</div>
  </div>`;

  // R1: show in order 1v8, 2v7, 3v6, 4v5 visually but pair correctly
  h += `<div class="round-label">Primera Ronda</div>`;
  // Show: 1v8 (idx0), 4v5 (idx1), 2v7 (idx2), 3v6 (idx3)
  h += buildMatchHtml(c.r1[0], `${conf}:r1:0`, true);  // 1v8
  h += buildMatchHtml(c.r1[1], `${conf}:r1:1`, true);  // 4v5
  h += buildMatchHtml(c.r1[2], `${conf}:r1:2`, true);  // 2v7
  h += buildMatchHtml(c.r1[3], `${conf}:r1:3`, true);  // 3v6

  h += `<div class="round-label">Semifinal de Conferencia</div>`;
  h += `<div style="font-size:10px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;margin-bottom:4px;padding-left:4px">Gan. 1vs8 — Gan. 4vs5</div>`;
  h += buildMatchHtml(c.r2[0], `${conf}:r2:0`, false);
  h += `<div style="font-size:10px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;margin-bottom:4px;padding-left:4px">Gan. 2vs7 — Gan. 3vs6</div>`;
  h += buildMatchHtml(c.r2[1], `${conf}:r2:1`, false);

  h += `<div class="round-label">Final de Conferencia</div>`;
  h += buildMatchHtml(c.r3[0], `${conf}:r3:0`, false);

  return h;
}

function buildFinalsHtml() {
  const m = S.finals;
  const w = getWinner(m);
  const champion = w !== null ? m.t[w] : null;
  let h = `<div class="finals-hero">
    <div class="finals-trophy">🏆</div>
    <div class="finals-title">NBA Finals</div>
    <div class="finals-sub">The Finals · NBA Championship</div>
  </div>`;
  h += `<div id="champion-banner-wrap">`;
  if(champion) {
    h += `<div class="champion-banner">
      <div class="champion-label">🏆 CAMPEÓN NBA</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">
        ${logoWrapHtml(champion.id,54)}
        <div class="champion-name">${champion.name}</div>
      </div>
    </div>`;
  }
  h += `</div>`;
  if(!m.t[0] || !m.t[1]) {
    h += `<div class="locked-notice"><div class="icon">🔒</div><div>Completa las Finales de Conferencia para ver el duelo final</div></div>`;
  }
  h += `<div class="round-label">Gran Final</div>`;
  h += buildMatchHtml(m,'finals',false);
  return h;
}

// ─── PATCH / UPDATE ───────────────────────────────────────────────────
function patchRow(container, match, ti, path, canSelect, w) {
  const key = rowKey(path, ti);
  const el = container.querySelector(`[data-rowkey="${key}"]`);
  if(!el) return;
  const team = match.t[ti];
  const isWin = w === ti;
  const hasTeams = !!(match.t[0] && match.t[1]);
  const wins = match.w[ti];
  el.className = 'team-row'+(isWin?' winner':'')+(canSelect?' tappable':'');
  const wrap = el.querySelector('.team-logo-wrap');
  if(wrap) {
    const prevId = wrap.dataset.logoid||'';
    const newId = team ? team.id : '';
    if(prevId !== newId) {
      wrap.outerHTML = team ? logoWrapHtml(team.id,28) : `<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
    }
  }
  const seedEl = el.querySelector('.seed-badge');
  if(seedEl) { seedEl.textContent = team?(team.seed||''):'—'; seedEl.style.opacity = team?'':'0.4'; }
  const nameEl = el.querySelector('.team-name');
  if(nameEl) {
    nameEl.textContent = team ? team.short : (canSelect?'Elegir':'Por definir');
    nameEl.className = 'team-name'+(team?'':' empty');
  }
  let ctrl = el.querySelector('.wins-control');
  if(hasTeams) {
    if(!ctrl) {
      el.insertAdjacentHTML('beforeend',`<div class="wins-control" onclick="event.stopPropagation()">
        <button class="wbtn" onclick="setWins('${path}',${ti},-1)">−</button>
        <span class="wins-num">0</span>
        <button class="wbtn" onclick="setWins('${path}',${ti},1)">+</button>
      </div>`);
      ctrl = el.querySelector('.wins-control');
    }
    ctrl.style.display = '';
    const numEl = ctrl.querySelector('.wins-num');
    numEl.textContent = wins;
    numEl.className = 'wins-num'+(wins===4?' four':'');
  } else if(ctrl) {
    ctrl.style.display = 'none';
  }
}

function patchBar(container, match, path) {
  const bar = container.querySelector(`[data-bar="${path}"]`);
  if(!bar) return;
  const w = getWinner(match);
  const hasTeams = !!(match.t[0] && match.t[1]);
  if(w !== null) { bar.style.display=''; bar.innerHTML=`<span class="series-result">FINAL 4-${match.w[1-w]}</span>`; }
  else if(hasTeams && (match.w[0]>0||match.w[1]>0)) { bar.style.display=''; bar.innerHTML=pipsHtml(match.w[0],match.w[1]); }
  else { bar.style.display='none'; }
  const matchEl = container.querySelector(`[data-matchkey="${matchKey(path)}"]`);
  if(matchEl) matchEl.classList.toggle('has-winner', w!==null);
}

function patchMatch(container, match, path, canSelect) {
  const w = getWinner(match);
  patchRow(container,match,0,path,canSelect,w);
  patchRow(container,match,1,path,canSelect,w);
  patchBar(container,match,path);
}

function renderAll() {
  ['east','west'].forEach(conf => {
    if(!pagesBuilt[conf]) return;
    const container = document.getElementById('page-'+conf);
    const c = S[conf];
    c.r1.forEach((m,i) => patchMatch(container,m,`${conf}:r1:${i}`,true));
    c.r2.forEach((m,i) => patchMatch(container,m,`${conf}:r2:${i}`,false));
    patchMatch(container,c.r3[0],`${conf}:r3:0`,false);
  });
  if(pagesBuilt.finals) {
    const container = document.getElementById('page-finals');
    patchMatch(container,S.finals,'finals',false);
    const w = getWinner(S.finals);
    const champion = w !== null ? S.finals.t[w] : null;
    const banner = document.getElementById('champion-banner-wrap');
    if(banner) {
      if(champion) {
        banner.innerHTML=`<div class="champion-banner">
          <div class="champion-label">🏆 CAMPEÓN NBA</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">
            ${logoWrapHtml(champion.id,54)}
            <div class="champion-name">${champion.name}</div>
          </div>
        </div>`;
      } else { banner.innerHTML=''; }
    }
    const notice = container.querySelector('.locked-notice');
    if(notice) notice.style.display = (S.finals.t[0]&&S.finals.t[1])?'none':'block';
  }
}

function setWins(path, ti, delta) {
  let match;
  if(path === 'finals') match = S.finals;
  else { const [conf,round,mi] = path.split(':'); match = S[conf][round][+mi]; }
  if(!match.t[ti]) return;
  let v = match.w[ti] + delta;
  match.w[ti] = Math.max(0, Math.min(4, v));
  if(match.w[ti] === 4) match.w[1-ti] = Math.min(match.w[1-ti], 3);
  propagate();
  renderAll();
  scheduleSave();
}

let pagesBuilt = {east:false, west:false, finals:false};

function ensurePageBuilt(p) {
  if(!pagesBuilt[p]) {
    if(p==='east') document.getElementById('page-east').innerHTML = buildConfHtml('east');
    else if(p==='west') document.getElementById('page-west').innerHTML = buildConfHtml('west');
    else if(p==='finals') document.getElementById('page-finals').innerHTML = buildFinalsHtml();
    pagesBuilt[p] = true;
  }
}

function showPage(p) {
  ['east','west','finals'].forEach(id => {
    document.getElementById('page-'+id).classList.toggle('active', id===p);
    const tab = document.getElementById('tab-'+id);
    tab.className = 'tab';
    if(id===p) tab.classList.add('active-'+id);
  });
  S.activePage = p;
  ensurePageBuilt(p);
  renderAll();
}

// ─── SELECTOR ────────────────────────────────────────────────────────
function openSelector(path, ti) {
  selCtx = {path, ti};
  const [conf] = path.split(':');
  const teams = TEAMS.filter(t => t.conf === (conf==='east'?'East':'West'));
  document.getElementById('sel-title').textContent = 'Elegir equipo';
  document.getElementById('sel-sub').textContent = conf==='east'?'Conferencia Este':'Conferencia Oeste';
  let h = '';
  teams.forEach(t => {
    h += `<div class="sel-item" onclick="selectTeam('${t.id}')">
      ${logoWrapHtml(t.id,28)}
      <div><div class="sel-name">${t.name}</div><div class="sel-conf">${t.conf}</div></div>
    </div>`;
  });
  document.getElementById('sel-list').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  selCtx = null;
}

function overlayClick(e) {
  if(e.target === document.getElementById('overlay')) closeOverlay();
}

function selectTeam(id) {
  if(!selCtx) return;
  const t = TEAMS.find(x => x.id === id);
  const {path, ti} = selCtx;
  const [conf,round,mi] = path.split(':');
  const match = S[conf][round][+mi];
  match.t[ti] = {...t, seed: match.t[ti]?.seed || ''};
  match.w[ti] = 0;
  propagate();
  closeOverlay();
  renderAll();
  scheduleSave();
}

window.tryNextExt = function(img, base, idx) {
  const exts = ['png','jpg','jpeg','webp','svg'];
  const next = idx+1;
  if(next < exts.length) {
    img.onerror = function(){ tryNextExt(img,base,next); };
    img.src = base+'.'+exts[next];
  } else {
    img.style.display='none';
    const ph = document.createElement('div');
    ph.className='logo-placeholder';
    ph.textContent=base.split('/').pop().substring(0,3);
    img.parentNode.replaceChild(ph,img);
  }
};

// Init
propagate();
</script>
