    west:{
      r1:[{t:[mkTeam(1,'OKC'),mkTeam(8,'NOP')],w:[0,0]},{t:[mkTeam(4,'LAC'),mkTeam(5,'DAL')],w:[0,0]},{t:[mkTeam(2,'DEN'),mkTeam(7,'LAL')],w:[0,0]},{t:[mkTeam(3,'MIN'),mkTeam(6,'PHX')],w:[0,0]}],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],r3:[{t:[null,null],w:[0,0]}]
    },
    finals:{t:[null,null],w:[0,0]}
  };
}

let REAL = freshBracket();
let PRED = { pred1: freshBracket(), pred2: {east:{r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},west:{r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},finals:{w:[0,0]}}, pred3: {east:{r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},west:{r2:[{w:[0,0]},{w:[0,0]}],r3:[{w:[0,0]}]},finals:{w:[0,0]}}, predf: {finals:{w:[0,0]}} };

let currentMode = 'pred1';
let activeTab = 'east';
let selCtxG = null;
let saveTimer = null;
let builtPages = {};

// Sincronización: Copia los equipos de R1 de REAL a PRED1
function syncTeamsFromReal() {
  ['east','west'].forEach(conf => {
    REAL[conf].r1.forEach((match, i) => {
      PRED.pred1[conf].r1[i].t[0] = match.t[0] ? {...match.t[0]} : null;
      PRED.pred1[conf].r1[i].t[1] = match.t[1] ? {...match.t[1]} : null;
    });
  });
  propagate(PRED.pred1);
}

window._syncRealData = (rdata) => {
  if(!rdata) return;
  REAL = JSON.parse(JSON.stringify(rdata));
  syncTeamsFromReal();
  invalidateAll();
  rebuildPage();
};

function loadAll(uid){
  window._loadShared('realResults', rdata => {
    if(rdata) REAL = JSON.parse(JSON.stringify(rdata));
    syncTeamsFromReal();
    window._loadUserData(uid, 'pred1', d => { if(d) PRED.pred1 = JSON.parse(JSON.stringify(d)); syncTeamsFromReal(); rebuildPage(); });
    window._loadUserData(uid, 'pred2', d => { if(d) PRED.pred2 = JSON.parse(JSON.stringify(d)); });
    window._loadUserData(uid, 'pred3', d => { if(d) PRED.pred3 = JSON.parse(JSON.stringify(d)); });
    window._loadUserData(uid, 'predf', d => { if(d) PRED.predf = JSON.parse(JSON.stringify(d)); });
  });
}

function propagate(B){
  ['east','west'].forEach(conf=>{
    const c=B[conf]; if(!c||!c.r1) return;
    [0,1].forEach(p=>{
      const s0=c.r1[p*2], s1=c.r1[p*2+1], w0=getW(s0), w1=getW(s1), dst=c.r2[p];
      dst.t[0]=w0!==null?{...s0.t[w0]}:null; dst.t[1]=w1!==null?{...s1.t[w1]}:null;
    });
    const wr0=getW(c.r2[0]), wr1=getW(c.r2[1]), d3=c.r3[0];
    d3.t[0]=wr0!==null?{...c.r2[0].t[wr0]}:null; d3.t[1]=wr1!==null?{...c.r2[1].t[wr1]}:null;
  });
  const ew=getW(B.east?.r3?.[0]), ww=getW(B.west?.r3?.[0]);
  B.finals.t[0]=ew!==null?{...B.east.r3[0].t[ew]}:null; B.finals.t[1]=ww!==null?{...B.west.r3[0].t[ww]}:null;
}

function getW(m){ if(!m) return null; if(m.w[0]===4) return 0; if(m.w[1]===4) return 1; return null; }

function adjWins(path, ti, delta, mode){
  ti=+ti;
  let target = (mode==='real') ? REAL : (mode==='pred1' ? PRED.pred1 : null);
  
  if(target) {
    const [c,r,i] = path==='finals' ? ['finals','finals','0'] : path.split(':');
    const m = path==='finals' ? target.finals : target[c][r][+i];
    m.w[ti] = Math.max(0, Math.min(4, m.w[ti]+delta));
    if(m.w[ti]===4) m.w[1-ti]=Math.min(m.w[1-ti],3);
    propagate(target);
    if(mode==='real') syncTeamsFromReal();
  } else {
    const P = PRED[mode];
    const [c,r,i] = path==='finals' ? ['finals','finals','0'] : path.split(':');
    const wRef = path==='finals' ? P.finals.w : P[c][r][+i].w;
    wRef[ti] = Math.max(0, Math.min(4, wRef[ti]+delta));
    if(wRef[ti]===4) wRef[1-ti]=Math.min(wRef[1-ti],3);
  }
  invalidateAll();
  rebuildPage();
  scheduleSave();
}

function pickTeam(id){
  if(!selCtxG) return;
  const t=TEAMS.find(x=>x.id===id);
  const {path,ti}=selCtxG;
  const [conf,rnd,idx]=path.split(':');
  REAL[conf][rnd][+idx].t[ti]={...t, seed: REAL[conf][rnd][+idx].t[ti]?.seed||''};
  REAL[conf][rnd][+idx].w[ti]=0;
  propagate(REAL);
  syncTeamsFromReal(); // Important: Sincroniza hacia PRED1 inmediatamente
  closeOv();
  invalidateAll();
  rebuildPage();
  scheduleSave();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const uid=window._fbUser?.uid; if(!uid) return;
    if(currentMode==='real' && window._isAdmin){
      window._saveShared('realResults', REAL);
    } else if(currentMode !== 'real' && currentMode !== 'score') {
      window._saveUserData(uid, currentMode, PRED[currentMode]);
    }
    const b=document.getElementById('save-badge');
    b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),2000);
  },1000);
}

function invalidateAll(){ builtPages={}; }
function showApp(user){ document.getElementById('login-screen').style.display='none'; document.getElementById('app-screen').style.display='block'; document.getElementById('admin-badge').style.display=window._isAdmin?'':'none'; }
function showLogin(){ document.getElementById('login-screen').style.display='flex'; document.getElementById('app-screen').style.display='none'; }
function handleEmailLogin(){ const e=document.getElementById('email-input').value.trim(), p=document.getElementById('pass-input').value; window._loginEmail(e,p); }
function showAuthError(m){ document.getElementById('auth-error').textContent=m; }

function logoHtml(id,size){
  if(!id) return `<div class="lph">?</div>`;
  const base='LOGOS/'+(LOGO_MAP[id]||id);
  return `<div class="tlw" style="width:${size}px;height:${size}px"><img class="tl" src="${base}.png" width="${size*1.5}" onerror="tryExt(this,'${base}',0)"></div>`;
}

function matchHtml(B, path, mode){
  const isAdmin=!!window._isAdmin;
  const isReal=(mode==='real');
  const [conf,rnd,idx]=path==='finals'?['finals','finals','0']:path.split(':');
  const m=path==='finals'?B.finals:B[conf][rnd][+idx];
  const canEdit=isReal?isAdmin:true;
  const canSelectTeam=isAdmin&&isReal&&rnd==='r1';
  
  const row=(ti)=>{
    const team=m.t[ti], wins=m.w[ti], isWin=getW(m)===ti;
    return `<div class="team-row ${isWin?'winner':''} ${canSelectTeam?'tap':''}" ${canSelectTeam?`onclick="openSel('${path}',${ti})"`:''}>
      ${logoHtml(team?.id,28)}
      <span class="seed-badge">${team?.seed||'—'}</span>
      <span class="team-name ${!team?'empty':''}">${team?team.short:(canSelectTeam?'Elegir':'TBD')} ${canSelectTeam?'<span class="admin-tap-hint">TAP</span>':''}</span>
      ${(m.t[0]&&m.t[1]&&canEdit)?`<div class="wins-control" onclick="event.stopPropagation()"><button class="wbtn" onclick="adjWins('${path}',${ti},-1,'${mode}')">−</button><span class="wins-num">${wins}</span><button class="wbtn" onclick="adjWins('${path}',${ti},1,'${mode}')">+</button></div>`:''}
    </div>`;
  };
  return `<div class="matchup">${row(0)}${row(1)}</div>`;
}

function partialMatchHtml(predKey, path){
  const realM = (path==='finals')?REAL.finals : REAL[path.split(':')[0]][path.split(':')[1]][+path.split(':')[2]];
  const pw = (path==='finals')?PRED[predKey].finals.w : PRED[predKey][path.split(':')[0]][path.split(':')[1]][+path.split(':')[2]].w;
  const winner = pw[0]===4?0:pw[1]===4?1:null;
  const row=(ti)=>{
    const team=realM.t[ti], isWin=winner===ti;
    return `<div class="team-row ${isWin?'winner':''}">
      ${logoHtml(team?.id,28)}
      <span class="seed-badge">${team?.seed||'—'}</span>
      <span class="team-name ${!team?'empty':''}">${team?team.short:'TBD'}</span>
      ${(realM.t[0]&&realM.t[1])?`<div class="wins-control"><button class="wbtn" onclick="adjWins('${path}',${ti},-1,'${predKey}')">−</button><span class="wins-num">${pw[ti]}</span><button class="wbtn" onclick="adjWins('${path}',${ti},1,'${predKey}')">+</button></div>`:''}
    </div>`;
  };
  return `<div class="matchup">${row(0)}${row(1)}</div>`;
}

function rebuildPage(){
  const container=document.getElementById('pg-'+activeTab);
  if(activeTab==='finals'){
    let h=`<div class="finals-hero"><div class="finals-trophy">🏆</div><div class="finals-title">NBA Finals</div></div>`;
    if(currentMode==='real') h+=matchHtml(REAL,'finals','real');
    else if(currentMode==='pred1') h+=matchHtml(PRED.pred1,'finals','pred1');
    else h+=partialMatchHtml(currentMode,'finals');
    container.innerHTML=h;
  } else {
    let h=`<div class="conf-header ${activeTab}"><div class="conf-label">${activeTab==='east'?'ESTE':'OESTE'}</div></div>`;
    if(currentMode==='real'){
      h+=`<div class="rl">R1</div>`; REAL[activeTab].r1.forEach((_,i)=> h+=matchHtml(REAL,`${activeTab}:r1:${i}`,'real'));
      h+=`<div class="rl">Semis</div>`; REAL[activeTab].r2.forEach((_,i)=> h+=matchHtml(REAL,`${activeTab}:r2:${i}`,'real'));
      h+=`<div class="rl">Final</div>`; h+=matchHtml(REAL,`${activeTab}:r3:0`,'real');
    } else if(currentMode==='pred1'){
      h+=`<div class="rl">R1</div>`; PRED.pred1[activeTab].r1.forEach((_,i)=> h+=matchHtml(PRED.pred1,`${activeTab}:r1:${i}`,'pred1'));
      h+=`<div class="rl">Semis</div>`; PRED.pred1[activeTab].r2.forEach((_,i)=> h+=matchHtml(PRED.pred1,`${activeTab}:r2:${i}`,'pred1'));
      h+=`<div class="rl">Final</div>`; h+=matchHtml(PRED.pred1,`${activeTab}:r3:0`,'pred1');
    } else {
      if(currentMode==='pred2' || currentMode==='pred3'){
        if(currentMode==='pred2'){ h+=`<div class="rl">Semis</div>`; [0,1].forEach(i=> h+=partialMatchHtml(currentMode,`${activeTab}:r2:${i}`)); }
        h+=`<div class="rl">Final</div>`; h+=partialMatchHtml(currentMode,`${activeTab}:r3:0`);
      }
    }
    container.innerHTML=h;
  }
}

function switchMode(m){ currentMode=m; invalidateAll(); 
  document.getElementById('bracket-area').style.display=m==='score'?'none':'block';
  document.getElementById('score-container').style.display=m==='score'?'block':'none';
  if(m==='score') renderScore(); else rebuildPage();
}
function showTab(t){ activeTab=t; 
  ['east','west','finals'].forEach(x=> document.getElementById('pg-'+x).classList.toggle('active',x===t));
  rebuildPage(); 
}
function openSel(p,t){ if(!window._isAdmin) return; selCtxG={path:p,ti:t}; 
  const conf=p.split(':')[0]; const list=TEAMS.filter(x=>x.conf===(conf==='east'?'East':'West'));
  document.getElementById('sel-list').innerHTML=list.map(x=> `<div class="sel-item" onclick="pickTeam('${x.id}')">${logoHtml(x.id,24)} ${x.name}</div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeOv(){ document.getElementById('overlay').classList.remove('open'); }
function oClick(e){ if(e.target.id==='overlay') closeOv(); }

function renderScore(){
  document.getElementById('score-container').innerHTML=`<div class="score-hero"><div class="score-total-num">Próximamente</div><div style="margin-top:10px; color:var(--text3)">La lógica de puntos se está procesando</div></div>`;
}

window.tryExt=function(img,base,idx){
  const exts=['png','jpg','webp']; if(idx>=exts.length) return;
  img.onerror=()=>tryExt(img,base,idx+1); img.src=base+'.'+exts[idx];
};
</script>
</body>
