<title>NBAngs – Playoff Bracket</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
           signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAY9Byo6XKRTys4zRaMcP57v2hUiLcwxvw",
    authDomain: "nbangs-a10fc.firebaseapp.com",
    databaseURL: "https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId: "nbangs-a10fc",
    storageBucket: "nbangs-a10fc.firebasestorage.app",
    messagingSenderId: "498517184830",
    appId: "1:498517184830:web:c6fb5400a72d89fb8a1c6f",
    measurementId: "G-G2EDJKK0C2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      window._fbUser = user;
      showApp(user);
      loadBracket(user.uid);
    } else {
      window._fbUser = null;
      showLogin();
    }
  });

  window._saveBracket = function(uid, state) {
    set(ref(db, 'brackets/' + uid), state);
  };

  window._loadBracket = function(uid, cb) {
    get(ref(db, 'brackets/' + uid)).then(snap => {
      if (snap.exists()) cb(snap.val());
      else cb(null);
    }).catch(() => cb(null));
  };

  // Real results: shared across all users (admin sets them)
  window._saveRealResults = function(state) {
    set(ref(db, 'realResults'), state);
  };

  window._loadRealResults = function(cb) {
    get(ref(db, 'realResults')).then(snap => {
      if (snap.exists()) cb(snap.val());
      else cb(null);
    }).catch(() => cb(null));
  };

  window._loginGoogle = function() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(e => showAuthError(e.message));
  };

  window._loginEmail = function(email, pass) {
    signInWithEmailAndPassword(auth, email, pass)
      .catch(() => {
        createUserWithEmailAndPassword(auth, email, pass)
          .catch(e => showAuthError(e.message));
      });
  };

  window._logout = function() {
    signOut(auth);
  };
</script>

<style>

  .overlay.open { display: flex; }

  .selector-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .selector-header { padding: 12px 16px 10px; flex-shrink: 0; }
  .selector-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
  .selector-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .selector-divider { height: 1px; background: var(--border); flex-shrink: 0; }
  .selector-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .sel-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
  .sel-item:active { background: var(--bg3); }
  .sel-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .sel-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); }

</style>

<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-logo">NBA</div>
  <div class="login-title">NBAngs</div>
  <div class="login-sub">PLAYOFF BRACKET · 2024-25</div>
  <div class="login-card">
    <h3>Iniciar sesión</h3>
    <input class="login-input" id="email-input" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="pass-input" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" onclick="handleEmailLogin()">Entrar / Registrarse</button>
    <div class="divider"><span>o</span></div>
    <button class="btn-google" onclick="window._loginGoogle && window._loginGoogle()">

<script>
// ─── TEAMS ──────────────────────────────────────────────────────────
const TEAMS = [
  {id:'ATL',name:'Atlanta Hawks',short:'Hawks',conf:'East'},
  {id:'BOS',name:'Boston Celtics',short:'Celtics',conf:'East'},
  {id:'BKN',name:'Brooklyn Nets',short:'Nets',conf:'East'},
  {id:'CHA',name:'Charlotte Hornets',short:'Hornets',conf:'East'},
  {id:'CHI',name:'Chicago Bulls',short:'Bulls',conf:'East'},
  {id:'CLE',name:'Cleveland Cavaliers',short:'Cavaliers',conf:'East'},
  {id:'DET',name:'Detroit Pistons',short:'Pistons',conf:'East'},
  {id:'IND',name:'Indiana Pacers',short:'Pacers',conf:'East'},
  {id:'MIA',name:'Miami Heat',short:'Heat',conf:'East'},
  {id:'MIL',name:'Milwaukee Bucks',short:'Bucks',conf:'East'},
  {id:'NYK',name:'New York Knicks',short:'Knicks',conf:'East'},
  {id:'ORL',name:'Orlando Magic',short:'Magic',conf:'East'},
  {id:'PHI',name:'Philadelphia 76ers',short:'76ers',conf:'East'},
  {id:'TOR',name:'Toronto Raptors',short:'Raptors',conf:'East'},
  {id:'WAS',name:'Washington Wizards',short:'Wizards',conf:'East'},
  {id:'DAL',name:'Dallas Mavericks',short:'Mavericks',conf:'West'},
  {id:'DEN',name:'Denver Nuggets',short:'Nuggets',conf:'West'},
  {id:'GSW',name:'Golden State Warriors',short:'Warriors',conf:'West'},
  {id:'HOU',name:'Houston Rockets',short:'Rockets',conf:'West'},
  {id:'LAC',name:'LA Clippers',short:'Clippers',conf:'West'},
  {id:'LAL',name:'Los Angeles Lakers',short:'Lakers',conf:'West'},
  {id:'MEM',name:'Memphis Grizzlies',short:'Grizzlies',conf:'West'},
  {id:'MIN',name:'Minnesota Timberwolves',short:'Timberwolves',conf:'West'},
  {id:'NOP',name:'New Orleans Pelicans',short:'Pelicans',conf:'West'},
  {id:'OKC',name:'Oklahoma City Thunder',short:'Thunder',conf:'West'},
  {id:'PHX',name:'Phoenix Suns',short:'Suns',conf:'West'},
  {id:'POR',name:'Portland Trail Blazers',short:'Trail Blazers',conf:'West'},
  {id:'SAC',name:'Sacramento Kings',short:'Kings',conf:'West'},
  {id:'SAS',name:'San Antonio Spurs',short:'Spurs',conf:'West'},
  {id:'UTA',name:'Utah Jazz',short:'Jazz',conf:'West'},
];

const LOGO_MAP = {
  'ATL':'ATLANTAHAWKS','BOS':'BOSTONCELTICS','BKN':'BROOKLYNNETS','CHA':'CHARLOTTEHORNETS',
  'CHI':'CHICAGOBULLS','CLE':'CLEVELANDCAVALIERS','DET':'DETROITPISTONS','IND':'INDIANAPACERS',
  'MIA':'MIAMIHEAT','MIL':'MILWAUKEEBUCKS','NYK':'NEWYORKKNICKS','ORL':'ORLANDOMAGIC',
  'PHI':'PHILADELPHIA76ERS','TOR':'TORONTORAPTORS','WAS':'WASHINGTONWIZARDS',
  'DAL':'DALLASMAVERICKS','DEN':'DENVERNUGGETS','GSW':'GOLDENSTATEWARRIORS','HOU':'HOUSTONROCKETS',
  'LAC':'LACLIPPERS','LAL':'LOSANGELESLAKERS','MEM':'MEMPHISGRIZZLIES','MIN':'MINNESOTATIMBERWOLVES',
  'NOP':'NEWORLEANSPELICANS','OKC':'OKLAHOMACITYTHUNDER','PHX':'PHOENIXSUNS','POR':'PORTLANDTRAILBLAZERS',
  'SAC':'SACRAMENTOKINGS','SAS':'SANANTONIOSPURS','UTA':'UTAHJAZZ',
};

function makeTeam(seed, id) {
  const t = TEAMS.find(x => x.id === id);
  return { id, name: t.name, short: t.short, conf: t.conf, seed };
}

function emptyBracket() {
  return {
    east: {
      r1: [
        {t:[makeTeam(1,'BOS'), makeTeam(8,'MIA')], w:[0,0]},
        {t:[makeTeam(4,'CLE'), makeTeam(5,'ORL')], w:[0,0]},
        {t:[makeTeam(2,'NYK'), makeTeam(7,'PHI')], w:[0,0]},
        {t:[makeTeam(3,'MIL'), makeTeam(6,'IND')], w:[0,0]},
      ],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    west: {
      r1:[
        {t:[makeTeam(1,'OKC'), makeTeam(8,'NOP')], w:[0,0]},
        {t:[makeTeam(4,'LAC'), makeTeam(5,'DAL')], w:[0,0]},
        {t:[makeTeam(2,'DEN'), makeTeam(7,'LAL')], w:[0,0]},
        {t:[makeTeam(3,'MIN'), makeTeam(6,'PHX')], w:[0,0]},
      ],
      r2:[{t:[null,null],w:[0,0]},{t:[null,null],w:[0,0]}],
      r3:[{t:[null,null],w:[0,0]}],
    },
    finals:{t:[null,null],w:[0,0]},
  };
}

// ─── STATE ───────────────────────────────────────────────────────────
let S = emptyBracket();        // user predictions
let R = emptyBracket();        // real results
let currentMode = 'pred';      // 'pred' | 'real' | 'score'
let activePage = 'east';
let selCtx = null;
let saveTimer = null;
let pagesBuilt = {east:false, west:false, finals:false};
let rpagesBuilt = {east:false, west:false, finals:false};

// ─── AUTH / APP FLOW ─────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const av = document.getElementById('user-avatar');
  if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}">`;
  else av.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
}

function loadBracket(uid) {
  const tryLoad = () => {
    if (!window._loadBracket) { setTimeout(tryLoad, 300); return; }
    window._loadBracket(uid, data => {
      if (data) { try { S = JSON.parse(JSON.stringify(data)); } catch(e) {} }
      window._loadRealResults && window._loadRealResults(rdata => {
        if (rdata) { try { R = JSON.parse(JSON.stringify(rdata)); } catch(e) {} }
        pagesBuilt = {east:false,west:false,finals:false};
        rpagesBuilt = {east:false,west:false,finals:false};
        propagate(S);
        propagate(R);
        ensurePageBuilt('east');
        renderAll();
      });
    });
  };
  tryLoad();
}

function scheduleSave(isReal) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (isReal) {
      if (window._saveRealResults) {
        window._saveRealResults(JSON.parse(JSON.stringify(R)));
        flash();
      }
    } else {
      if (window._fbUser && window._saveBracket) {
        window._saveBracket(window._fbUser.uid, JSON.parse(JSON.stringify(S)));
        flash();
      }
    }
  }, 1200);
}

function flash() {
  const badge = document.getElementById('save-badge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

function handleEmailLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pass  = document.getElementById('pass-input').value;
  if (!email || !pass) { showAuthError('Ingresa email y contraseña'); return; }
  if (window._loginEmail) window._loginEmail(email, pass);
  else showAuthError('Firebase no cargó. Revisa tu conexión.');
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

// ─── MODE SWITCHER ───────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  ['pred','real','score'].forEach(m => {
    document.getElementById('mbtn-'+m).className = 'mode-btn' + (m === mode ? ' active-'+m : '');
  });
  const labels = {pred:'Mis Predicciones', real:'Resultados Reales', score:'Mi Puntuación'};
  document.getElementById('mode-label').textContent = labels[mode];

  const showTabs = mode !== 'score';
  document.getElementById('conf-tabs').style.display = showTabs ? 'flex' : 'none';
  document.getElementById('pred-pages').style.display = mode === 'pred' ? 'block' : 'none';
  document.getElementById('real-pages').style.display = mode === 'real' ? 'block' : 'none';
  document.getElementById('page-score').style.display = mode === 'score' ? 'block' : 'none';

  if (mode === 'pred') {
    showPredPage(activePage);
  } else if (mode === 'real') {
    showRealPage(activePage);
  } else {
    renderScorePage();
  }
}

// ─── BRACKET LOGIC ────────────────────────────────────────────────────
function getWinner(match) {
  if (match.w[0] === 4) return 0;
  if (match.w[1] === 4) return 1;
  return null;
}

function propagate(B) {
  ['east','west'].forEach(conf => {
    const c = B[conf];
    [0,1].forEach(p => {
      const s0 = c.r1[p*2], s1 = c.r1[p*2+1];
      const w0 = getWinner(s0), w1 = getWinner(s1);
      const dst = c.r2[p];
      const prev0 = dst.t[0] ? dst.t[0].id : null;
      const prev1 = dst.t[1] ? dst.t[1].id : null;
      dst.t[0] = w0 !== null ? {...s0.t[w0]} : null;
      dst.t[1] = w1 !== null ? {...s1.t[w1]} : null;
      if (dst.t[0] && prev0 !== dst.t[0].id) dst.w[0] = 0;
      if (dst.t[1] && prev1 !== dst.t[1].id) dst.w[1] = 0;
    });
    const wr0 = getWinner(c.r2[0]), wr1 = getWinner(c.r2[1]);
    const d3 = c.r3[0];
    const pp0 = d3.t[0] ? d3.t[0].id : null, pp1 = d3.t[1] ? d3.t[1].id : null;
    d3.t[0] = wr0 !== null ? {...c.r2[0].t[wr0]} : null;
    d3.t[1] = wr1 !== null ? {...c.r2[1].t[wr1]} : null;
    if (d3.t[0] && pp0 !== d3.t[0].id) d3.w[0] = 0;
    if (d3.t[1] && pp1 !== d3.t[1].id) d3.w[1] = 0;
  });
  const ew = getWinner(B.east.r3[0]), ww = getWinner(B.west.r3[0]);
  const prev0 = B.finals.t[0] ? B.finals.t[0].id : null;
  const prev1 = B.finals.t[1] ? B.finals.t[1].id : null;
  B.finals.t[0] = ew !== null ? {...B.east.r3[0].t[ew]} : null;
  B.finals.t[1] = ww !== null ? {...B.west.r3[0].t[ww]} : null;
  if (B.finals.t[0] && prev0 !== B.finals.t[0].id) B.finals.w[0] = 0;
  if (B.finals.t[1] && prev1 !== B.finals.t[1].id) B.finals.w[1] = 0;
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────
function matchKey(path, prefix) { return (prefix||'')+'match-' + path.replace(/:/g,'-'); }
function rowKey(path, ti, prefix) { return matchKey(path,prefix)+'-r'+ti; }

function pipsHtml(w0,w1) {
  let h='<div class="pip-wrap">';
  for(let i=0;i<4;i++) h+=`<div class="pip${i<w0?' filled-top':''}"></div>`;
  h+='</div>';
  h+=`<span style="font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif">${w0}-${w1}</span>`;
  h+='<div class="pip-wrap">';
  for(let i=0;i<4;i++) h+=`<div class="pip${i<w1?' filled-bot':''}"></div>`;
  h+='</div>';
  return h;
}

function logoWrapHtml(id, size) {
  if(!id) return `<div class="logo-placeholder">?</div>`;
  const base='LOGOS/'+LOGO_MAP[id];
  const imgSize=Math.round(size*1.6);
  return `<div class="team-logo-wrap" data-logoid="${id}" style="width:${size}px;height:${size}px">
    <img class="team-logo" src="${base}.png" width="${imgSize}" height="${imgSize}"
      style="width:${imgSize}px;height:${imgSize}px;object-fit:cover;display:block"
      onerror="tryNextExt(this,'${base}',0)">
  </div>`;
}

function buildRowHtml(team, ti, path, canSelect, wins, isWin, hasTeams, prefix) {
  const px = prefix || '';
  const winCls = isWin ? ' winner' : '';
  const tapCls = canSelect ? ' tappable' : '';
  const tapAttr = canSelect ? `onclick="openSelector('${path}',${ti},'${px}')"` : '';
  const logo = team ? logoWrapHtml(team.id, 28) : `<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
  const seedHtml = team ? `<span class="seed-badge">${team.seed||''}</span>` : `<span class="seed-badge" style="opacity:.4">—</span>`;
  const nameHtml = team ? `<span class="team-name">${team.short}</span>` : `<span class="team-name empty">${canSelect?'Elegir':'Por definir'}</span>`;
  const winsHtml = !hasTeams ? '' :
    `<div class="wins-control" onclick="event.stopPropagation()">
      <button class="wbtn" onclick="setWins('${path}',${ti},-1,'${px}')">−</button>
      <span class="wins-num${wins===4?' four':''}">${wins}</span>
      <button class="wbtn" onclick="setWins('${path}',${ti},1,'${px}')">+</button>
    </div>`;
  return `<div class="team-row${winCls}${tapCls}" data-rowkey="${rowKey(path,ti,px)}" ${tapAttr}>${logo}${seedHtml}${nameHtml}${winsHtml}</div>`;
}

function buildMatchHtml(match, path, canSelect, prefix) {
  const px = prefix || '';
  const w = getWinner(match);
  const hasTeams = !!(match.t[0] && match.t[1]);
  const r0 = buildRowHtml(match.t[0],0,path,canSelect,match.w[0],w===0,hasTeams,px);
  const r1 = buildRowHtml(match.t[1],1,path,canSelect,match.w[1],w===1,hasTeams,px);
  let bar = '';
  if(w !== null) bar=`<div class="series-bar" data-bar="${px}${path}"><span class="series-result">FINAL 4-${match.w[1-w]}</span></div>`;
  else if(hasTeams && (match.w[0]>0||match.w[1]>0)) bar=`<div class="series-bar" data-bar="${px}${path}">${pipsHtml(match.w[0],match.w[1])}</div>`;
  else bar=`<div class="series-bar" data-bar="${px}${path}" style="display:none"></div>`;
  return `<div class="matchup${w!==null?' has-winner':''}" data-matchkey="${matchKey(path,px)}">${r0}${r1}${bar}</div>`;
}

function buildConfHtml(conf, B, prefix, isReal) {
  const px = prefix || '';
  const c = B[conf];
  const color = conf === 'east' ? 'east' : 'west';
  const label = conf === 'east' ? 'Este' : 'Oeste';
  let h = '';
  if (isReal) {
    h += `<div class="real-mode-banner"><div class="real-mode-banner-dot"></div><div class="real-mode-banner-text">MODO RESULTADOS REALES — todos ven estos datos</div></div>`;
  }
  h += `<div class="conf-header ${color}">
    <div class="conf-dot ${color}"></div>
    <div class="conf-label ${color}">Conferencia ${label}</div>
  </div>`;
  h += `<div class="round-label">Primera Ronda</div>`;
  h += buildMatchHtml(c.r1[0], `${conf}:r1:0`, true, px);
  h += buildMatchHtml(c.r1[1], `${conf}:r1:1`, true, px);
  h += buildMatchHtml(c.r1[2], `${conf}:r1:2`, true, px);
  h += buildMatchHtml(c.r1[3], `${conf}:r1:3`, true, px);
  h += `<div class="round-label">Semifinal de Conferencia</div>`;
  h += `<div style="font-size:10px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;margin-bottom:4px;padding-left:4px">Gan. 1vs8 — Gan. 4vs5</div>`;
  h += buildMatchHtml(c.r2[0], `${conf}:r2:0`, false, px);
  h += `<div style="font-size:10px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;margin-bottom:4px;padding-left:4px">Gan. 2vs7 — Gan. 3vs6</div>`;
  h += buildMatchHtml(c.r2[1], `${conf}:r2:1`, false, px);
  h += `<div class="round-label">Final de Conferencia</div>`;
  h += buildMatchHtml(c.r3[0], `${conf}:r3:0`, false, px);
  return h;
}

function buildFinalsHtml(B, prefix, isReal) {
  const px = prefix || '';
  const m = B.finals;
  const w = getWinner(m);
  const champion = w !== null ? m.t[w] : null;
  let h = '';
  if (isReal) {
    h += `<div class="real-mode-banner"><div class="real-mode-banner-dot"></div><div class="real-mode-banner-text">MODO RESULTADOS REALES — todos ven estos datos</div></div>`;
  }
  h += `<div class="finals-hero">
    <div class="finals-trophy">🏆</div>
    <div class="finals-title">NBA Finals</div>
    <div class="finals-sub">The Finals · NBA Championship</div>
  </div>`;
  h += `<div id="${px}champion-banner-wrap">`;
  if(champion) {
    h += `<div class="champion-banner">
      <div class="champion-label">🏆 CAMPEÓN NBA</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">
        ${logoWrapHtml(champion.id,54)}
        <div class="champion-name">${champion.name}</div>
      </div>
    </div>`;
  }
  h += `</div>`;
  if(!m.t[0] || !m.t[1]) {
    h += `<div class="locked-notice" id="${px}finals-lock"><div class="icon">🔒</div><div>Completa las Finales de Conferencia</div></div>`;
  }
  h += `<div class="round-label">Gran Final</div>`;
  h += buildMatchHtml(m,'finals',false,px);
  return h;
}

// ─── PATCH / UPDATE ───────────────────────────────────────────────────
function patchRow(container, match, ti, path, canSelect, w, prefix) {
  const px = prefix || '';
  const key = rowKey(path, ti, px);
  const el = container.querySelector(`[data-rowkey="${key}"]`);
  if(!el) return;
  const team = match.t[ti];
  const isWin = w === ti;
  const hasTeams = !!(match.t[0] && match.t[1]);
  const wins = match.w[ti];
  el.className = 'team-row'+(isWin?' winner':'')+(canSelect?' tappable':'');
  const wrap = el.querySelector('.team-logo-wrap');
  if(wrap) {
    const prevId = wrap.dataset.logoid||'';
    const newId = team ? team.id : '';
    if(prevId !== newId) {
      wrap.outerHTML = team ? logoWrapHtml(team.id,28) : `<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
    }
  }
  const seedEl = el.querySelector('.seed-badge');
  if(seedEl) { seedEl.textContent = team?(team.seed||''):'—'; seedEl.style.opacity = team?'':'0.4'; }
  const nameEl = el.querySelector('.team-name');
  if(nameEl) {
    nameEl.textContent = team ? team.short : (canSelect?'Elegir':'Por definir');
    nameEl.className = 'team-name'+(team?'':' empty');
  }
  let ctrl = el.querySelector('.wins-control');
  if(hasTeams) {
    if(!ctrl) {
      el.insertAdjacentHTML('beforeend',`<div class="wins-control" onclick="event.stopPropagation()">
        <button class="wbtn" onclick="setWins('${path}',${ti},-1,'${px}')">−</button>
        <span class="wins-num">0</span>
        <button class="wbtn" onclick="setWins('${path}',${ti},1,'${px}')">+</button>
      </div>`);
      ctrl = el.querySelector('.wins-control');
    }
    ctrl.style.display = '';
    const numEl = ctrl.querySelector('.wins-num');
    numEl.textContent = wins;
    numEl.className = 'wins-num'+(wins===4?' four':'');
  } else if(ctrl) {
    ctrl.style.display = 'none';
  }
}

function patchBar(container, match, path, prefix) {
  const px = prefix || '';
  const bar = container.querySelector(`[data-bar="${px}${path}"]`);
  if(!bar) return;
  const w = getWinner(match);
  const hasTeams = !!(match.t[0] && match.t[1]);
  if(w !== null) { bar.style.display=''; bar.innerHTML=`<span class="series-result">FINAL 4-${match.w[1-w]}</span>`; }
  else if(hasTeams && (match.w[0]>0||match.w[1]>0)) { bar.style.display=''; bar.innerHTML=pipsHtml(match.w[0],match.w[1]); }
  else { bar.style.display='none'; }
  const matchEl = container.querySelector(`[data-matchkey="${matchKey(path,px)}"]`);
  if(matchEl) matchEl.classList.toggle('has-winner', w!==null);
}

function patchMatch(container, match, path, canSelect, prefix) {
  const w = getWinner(match);
  patchRow(container,match,0,path,canSelect,w,prefix);
  patchRow(container,match,1,path,canSelect,w,prefix);
  patchBar(container,match,path,prefix);
}

function renderBracket(container, B, prefix) {
  const px = prefix || '';
  ['east','west'].forEach(conf => {
    const c = B[conf];
    c.r1.forEach((m,i) => patchMatch(container,m,`${conf}:r1:${i}`,true,px));
    c.r2.forEach((m,i) => patchMatch(container,m,`${conf}:r2:${i}`,false,px));
    patchMatch(container,c.r3[0],`${conf}:r3:0`,false,px);
  });
  patchMatch(container,B.finals,'finals',false,px);
  // champion banner update
  const w = getWinner(B.finals);
  const champion = w !== null ? B.finals.t[w] : null;
  const banner = document.getElementById(px+'champion-banner-wrap');
  if(banner) {
    if(champion) {
      banner.innerHTML=`<div class="champion-banner">
        <div class="champion-label">🏆 CAMPEÓN NBA</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">
          ${logoWrapHtml(champion.id,54)}
          <div class="champion-name">${champion.name}</div>
        </div>
      </div>`;
    } else { banner.innerHTML=''; }
  }
}

function renderAll() {
  // pred pages
  ['east','west'].forEach(conf => {
    if(!pagesBuilt[conf]) return;
    const container = document.getElementById('page-'+conf);
    const c = S[conf];
    c.r1.forEach((m,i) => patchMatch(container,m,`${conf}:r1:${i}`,true,''));
    c.r2.forEach((m,i) => patchMatch(container,m,`${conf}:r2:${i}`,false,''));
    patchMatch(container,c.r3[0],`${conf}:r3:0`,false,'');
  });
  if(pagesBuilt.finals) {
    const container = document.getElementById('page-finals');
    patchMatch(container,S.finals,'finals',false,'');
    const w = getWinner(S.finals); const champion = w!==null?S.finals.t[w]:null;
    const banner = document.getElementById('champion-banner-wrap');
    if(banner) {
      if(champion) banner.innerHTML=`<div class="champion-banner"><div class="champion-label">🏆 CAMPEÓN NBA</div><div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">${logoWrapHtml(champion.id,54)}<div class="champion-name">${champion.name}</div></div></div>`;
      else banner.innerHTML='';
    }
  }
  // real pages
  ['east','west'].forEach(conf => {
    if(!rpagesBuilt[conf]) return;
    const container = document.getElementById('rpage-'+conf);
    const c = R[conf];
    c.r1.forEach((m,i) => patchMatch(container,m,`${conf}:r1:${i}`,true,'r'));
    c.r2.forEach((m,i) => patchMatch(container,m,`${conf}:r2:${i}`,false,'r'));
    patchMatch(container,c.r3[0],`${conf}:r3:0`,false,'r');
  });
  if(rpagesBuilt.finals) {
    const container = document.getElementById('rpage-finals');
    patchMatch(container,R.finals,'finals',false,'r');
    const w = getWinner(R.finals); const champion = w!==null?R.finals.t[w]:null;
    const banner = document.getElementById('rchampion-banner-wrap');
    if(banner) {
      if(champion) banner.innerHTML=`<div class="champion-banner"><div class="champion-label">🏆 CAMPEÓN NBA</div><div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">${logoWrapHtml(champion.id,54)}<div class="champion-name">${champion.name}</div></div></div>`;
      else banner.innerHTML='';
    }
  }
}

function setWins(path, ti, delta, prefix) {
  const isReal = prefix === 'r';
  const B = isReal ? R : S;
  let match;
  if(path === 'finals') match = B.finals;
  else { const [conf,round,mi] = path.split(':'); match = B[conf][round][+mi]; }
  if(!match.t[ti]) return;
  let v = match.w[ti] + delta;
  match.w[ti] = Math.max(0, Math.min(4, v));
  if(match.w[ti] === 4) match.w[1-ti] = Math.min(match.w[1-ti], 3);
  propagate(B);
  renderAll();
  scheduleSave(isReal);
}

// ─── PAGE MANAGEMENT ─────────────────────────────────────────────────
function ensurePageBuilt(p) {
  if(!pagesBuilt[p]) {
    if(p==='east') document.getElementById('page-east').innerHTML = buildConfHtml('east', S, '', false);
    else if(p==='west') document.getElementById('page-west').innerHTML = buildConfHtml('west', S, '', false);
    else if(p==='finals') document.getElementById('page-finals').innerHTML = buildFinalsHtml(S, '', false);
    pagesBuilt[p] = true;
  }
  if(!rpagesBuilt[p]) {
    if(p==='east') document.getElementById('rpage-east').innerHTML = buildConfHtml('east', R, 'r', true);
    else if(p==='west') document.getElementById('rpage-west').innerHTML = buildConfHtml('west', R, 'r', true);
    else if(p==='finals') document.getElementById('rpage-finals').innerHTML = buildFinalsHtml(R, 'r', true);
    rpagesBuilt[p] = true;
  }
}

function showPredPage(p) {
  activePage = p;
  ['east','west','finals'].forEach(id => {
    document.getElementById('page-'+id).classList.toggle('active', id===p);
    const tab = document.getElementById('tab-'+id);
    tab.className = 'tab';
    if(id===p) tab.classList.add('active-'+id);
  });
  ensurePageBuilt(p);
  renderAll();
}

function showRealPage(p) {
  activePage = p;
  ['east','west','finals'].forEach(id => {
    document.getElementById('rpage-'+id).classList.toggle('active', id===p);
    const tab = document.getElementById('tab-'+id);
    tab.className = 'tab';
    if(id===p) tab.classList.add('active-'+id);
  });
  ensurePageBuilt(p);
  renderAll();
}

function showPage(p) {
  if(currentMode === 'pred') showPredPage(p);
  else if(currentMode === 'real') showRealPage(p);
}

// ─── SCORING LOGIC ───────────────────────────────────────────────────
// 1 pt: acertaste el ganador de la serie
// 2 pts: acertaste el ganador Y el resultado exacto (4-X)
function scoreMatch(predMatch, realMatch) {
  const predW = getWinner(predMatch);
  const realW = getWinner(realMatch);
  if (realW === null) return { pts: null, status: 'pending' }; // result not yet set
  if (predW === null) return { pts: 0, status: 'miss' }; // user didn't predict
  const predWinnerId = predMatch.t[predW]?.id;
  const realWinnerId = realMatch.t[realW]?.id;
  if (!predWinnerId || !realWinnerId) return { pts: 0, status: 'miss' };
  if (predWinnerId !== realWinnerId) return { pts: 0, status: 'miss' };
  // Winner matches — check result
  const predLosses = predMatch.w[1-predW];
  const realLosses = realMatch.w[1-realW];
  if (predLosses === realLosses) return { pts: 2, status: 'exact' };
  return { pts: 1, status: 'winner' };
}

function getAllMatchPaths() {
  const paths = [];
  ['east','west'].forEach(conf => {
    for(let i=0;i<4;i++) paths.push({path:`${conf}:r1:${i}`, label:`${conf==='east'?'Este':'Oeste'} R1 (#${i+1})`, round:'R1'});
    for(let i=0;i<2;i++) paths.push({path:`${conf}:r2:${i}`, label:`${conf==='east'?'Este':'Oeste'} Semis (#${i+1})`, round:'Semis'});
    paths.push({path:`${conf}:r3:0`, label:`Final ${conf==='east'?'Este':'Oeste'}`, round:'Final Conf.'});
  });
  paths.push({path:'finals', label:'NBA Finals', round:'Finals'});
  return paths;
}

function getMatchFromBracket(B, path) {
  if(path === 'finals') return B.finals;
  const [conf,round,mi] = path.split(':');
  return B[conf][round][+mi];
}

function renderScorePage() {
  const container = document.getElementById('page-score');
  const matchPaths = getAllMatchPaths();
  let totalPts = 0;
  let pendingCount = 0;
  let scored = 0;
  const byRound = {};

  matchPaths.forEach(({path, label, round}) => {
    const pred = getMatchFromBracket(S, path);
    const real = getMatchFromBracket(R, path);
    const result = scoreMatch(pred, real);
    if(result.status === 'pending') pendingCount++;
    else { scored++; totalPts += result.pts; }
    if(!byRound[round]) byRound[round] = [];
    byRound[round].push({path, label, pred, real, result});
  });

  const hasAnyReal = matchPaths.some(({path}) => {
    const real = getMatchFromBracket(R, path);
    return getWinner(real) !== null;
  });

  let h = '';

  if(!hasAnyReal) {
    h = `<div class="score-hero">
      <div class="score-total-label">TUS PUNTOS</div>
      <div class="score-total-num">—</div>
      <div class="score-total-sub">Esperando resultados reales</div>
    </div>
    <div class="no-results-notice">
      <div class="icon">📊</div>
      <div>Cargá los resultados reales en la pestaña <strong>Resultados</strong> para ver tu puntuación.</div>
    </div>`;
    container.innerHTML = h;
    return;
  }

  h = `<div class="score-hero">
    <div class="score-total-label">TUS PUNTOS</div>
    <div class="score-total-num">${totalPts}</div>
    <div class="score-total-sub">${scored} series jugadas${pendingCount>0?` · ${pendingCount} pendientes`:''}</div>
  </div>
  <div class="score-legend">
    <div class="legend-chip"><div class="legend-dot p2"></div>2 pts — ganador + resultado exacto</div>
    <div class="legend-chip"><div class="legend-dot p1"></div>1 pt — solo el ganador</div>
    <div class="legend-chip"><div class="legend-dot p0"></div>0 pts — error / sin pred.</div>
  </div>`;

  const roundOrder = ['R1','Semis','Final Conf.','Finals'];
  roundOrder.forEach(round => {
    if(!byRound[round]) return;
    h += `<div class="score-section">
      <div class="score-section-title">${round}</div>`;
    byRound[round].forEach(({label, pred, real, result}) => {
      const realW = getWinner(real);
      const predW = getWinner(pred);
      const realWinnerName = realW !== null && real.t[realW] ? real.t[realW].short : '—';
      const predWinnerName = predW !== null && pred.t[predW] ? pred.t[predW].short : '—';
      const realResult = realW !== null ? `4-${real.w[1-realW]}` : '—';
      const predResult = predW !== null ? `4-${pred.w[1-predW]}` : '—';
      let chipClass = 'p0', chipLabel = '0 pts';
      if(result.status === 'pending') { chipClass = 'pending'; chipLabel = 'Pendiente'; }
      else if(result.pts === 2) { chipClass = 'p2'; chipLabel = '+2 pts ✓✓'; }
      else if(result.pts === 1) { chipClass = 'p1'; chipLabel = '+1 pt ✓'; }

      const winnerCorrect = result.pts >= 1;
      const resultCorrect = result.pts === 2;

      h += `<div class="score-match-card">
        <div class="score-match-header">
          <div class="score-match-title">${label}</div>
          <div class="pts-chip ${chipClass}">${chipLabel}</div>
        </div>
        <div class="score-row">
          <div class="score-label">Real</div>
          <div class="score-val">${realWinnerName} <span style="color:var(--text3)">${realResult}</span></div>
        </div>
        <div class="score-row">
          <div class="score-label">Tu pred.</div>
          <div class="score-val ${result.status==='pending'?'':winnerCorrect?'correct':'wrong'}">
            ${predWinnerName} <span style="color:var(--text3);${resultCorrect?'color:#5de088':''}">${predResult}</span>
          </div>
        </div>
      </div>`;
    });
    h += `</div>`;
  });

  container.innerHTML = h;
}

// ─── SELECTOR ────────────────────────────────────────────────────────
function openSelector(path, ti, prefix) {
  selCtx = {path, ti, prefix: prefix||''};
  const [conf] = path.split(':');
  const teams = TEAMS.filter(t => t.conf === (conf==='east'?'East':'West'));
  document.getElementById('sel-title').textContent = 'Elegir equipo';
  document.getElementById('sel-sub').textContent = (selCtx.prefix==='r'?'[REAL] ':'') + (conf==='east'?'Conferencia Este':'Conferencia Oeste');
  let h = '';
  teams.forEach(t => {
    h += `<div class="sel-item" onclick="selectTeam('${t.id}')">
      ${logoWrapHtml(t.id,28)}
      <div><div class="sel-name">${t.name}</div><div class="sel-conf">${t.conf}</div></div>
    </div>`;
  });
  document.getElementById('sel-list').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  selCtx = null;
}

function overlayClick(e) {
  if(e.target === document.getElementById('overlay')) closeOverlay();
}

function selectTeam(id) {
  if(!selCtx) return;
  const t = TEAMS.find(x => x.id === id);
  const {path, ti, prefix} = selCtx;
  const isReal = prefix === 'r';
  const B = isReal ? R : S;
  const [conf,round,mi] = path.split(':');
  const match = B[conf][round][+mi];
  match.t[ti] = {...t, seed: match.t[ti]?.seed || ''};
  match.w[ti] = 0;
  propagate(B);
  closeOverlay();
  renderAll();
  scheduleSave(isReal);
}

window.tryNextExt = function(img, base, idx) {
  const exts = ['png','jpg','jpeg','webp','svg'];
  const next = idx+1;
  if(next < exts.length) {
    img.onerror = function(){ tryNextExt(img,base,next); };
    img.src = base+'.'+exts[next];
  } else {
    img.style.display='none';
    const ph = document.createElement('div');
    ph.className='logo-placeholder';
    ph.textContent=base.split('/').pop().substring(0,3);
    img.parentNode.replaceChild(ph,img);
  }
};

// Init
propagate(S);
propagate(R);
</script>
