<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBAngs – Playoff Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
           signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAY9Byo6XKRTys4zRaMcP57v2hUiLcwxvw",
    authDomain: "nbangs-a10fc.firebaseapp.com",
    databaseURL: "https://nbangs-a10fc-default-rtdb.firebaseio.com",
    projectId: "nbangs-a10fc",
    storageBucket: "nbangs-a10fc.firebasestorage.app",
    messagingSenderId: "498517184830",
    appId: "1:498517184830:web:c6fb5400a72d89fb8a1c6f",
    measurementId: "G-G2EDJKK0C2"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      window._fbUser = user;
      showApp(user);
      // Load user's bracket
      get(ref(db,'brackets/'+user.uid)).then(snap=>{
        if(snap.exists()){ try{ S=JSON.parse(JSON.stringify(snap.val())); }catch(e){} }
        pagesBuilt={east:false,west:false,finals:false,leaderboard:false,admin:false};
        propagateState(S);
        ensurePageBuilt('east');
        renderAll();
      }).catch(()=>{ ensurePageBuilt('east'); });
      // Save display name
      const name=user.displayName||user.email.split('@')[0];
      set(ref(db,'users/'+user.uid),{name,email:user.email});
      // Listen real results
      onValue(ref(db,'results'),snap=>{
        window._results=snap.exists()?snap.val():null;
        if(window._results) try{ propagateState(window._results); }catch(e){}
        if(window._currentTab==='leaderboard') renderLeaderboard();
        if(window._currentTab==='admin'&&window._results){
          try{ RS=JSON.parse(JSON.stringify(window._results)); propagateState(RS); }catch(e){}
          pagesBuilt.admin=false;
          ensurePageBuilt('admin');
        }
      });
      // Listen all brackets for leaderboard
      onValue(ref(db,'brackets'),snap=>{ window._allBrackets=snap.exists()?snap.val(){}; if(window._currentTab==='leaderboard') renderLeaderboard(); });
      // Listen all users
      onValue(ref(db,'users'),snap=>{ window._allUsers=snap.exists()?snap.val(){}; if(window._currentTab==='leaderboard') renderLeaderboard(); });
    } else {
      window._fbUser=null;
      showLogin();
    }
  });

  window._saveBracket = (uid,state)=>set(ref(db,'brackets/'+uid),state);
  window._saveResults = (state)=>set(ref(db,'results'),state);
  window._loginGoogle = ()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>showAuthError(e.message));
  window._loginEmail  = (email,pass)=>signInWithEmailAndPassword(auth,email,pass)
    .catch(()=>createUserWithEmailAndPassword(auth,email,pass).catch(e=>showAuthError(e.message)));
  window._logout = ()=>signOut(auth);
</script>

<style>
  :root{
    --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1e2330;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --gold:#c9a84c;--gold2:#e8c96a;
    --text:#f0f2f5;--text2:#8a92a6;--text3:#535c70;
    --east2:#2589e0;--west2:#e05225;
    --win:#1a7a3c;
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1a2035 0%,var(--bg) 60%)}
  .login-logo{width:72px;height:72px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#000;margin-bottom:16px;box-shadow:0 0 40px rgba(201,168,76,0.35)}
  .login-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;color:var(--gold)}
  .login-sub{font-size:13px;color:var(--text3);letter-spacing:1px;margin-bottom:36px}
  .login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:360px}
  .login-card h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px}
  .login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:15px;color:var(--text);font-family:'Barlow',sans-serif;margin-bottom:10px;outline:none;transition:border-color 0.2s}
  .login-input:focus{border-color:var(--gold)}
  .btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;letter-spacing:0.5px}
  .btn-primary:active{background:#b8922e}
  .btn-google{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-google:active{background:var(--bg4)}
  .divider{display:flex;align-items:center;gap:10px;margin:12px 0}
  .divider span{font-size:12px;color:var(--text3)}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .auth-error{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:16px}

  /* APP */
  #app-screen{display:none}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
  .header-logo{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#000;flex-shrink:0}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--text);line-height:1}
  .header-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
  .header-user{margin-left:auto;display:flex;align-items:center;gap:8px}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden}
  .user-avatar img{width:100%;height:100%;object-fit:cover}
  .btn-logout{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:11px;font-family:'Barlow Condensed',sans-serif;padding:4px 10px;cursor:pointer}
  .btn-logout:active{background:var(--bg4)}
  .save-badge{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--win);color:#9effc0;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .save-badge.show{opacity:1}

  /* TABS */
  .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1;min-width:70px;padding:11px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.3px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;user-select:none}
  .tab.active-east{color:var(--east2);border-bottom-color:var(--east2);background:rgba(37,137,224,0.06)}
  .tab.active-west{color:var(--west2);border-bottom-color:var(--west2);background:rgba(224,82,37,0.06)}
  .tab.active-finals{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.06)}
  .tab.active-leaderboard{color:#a78bfa;border-bottom-color:#a78bfa;background:rgba(167,139,250,0.06)}
  .tab.active-admin{color:#fb923c;border-bottom-color:#fb923c;background:rgba(251,146,60,0.06)}

  .page{display:none;padding:16px}
  .page.active{display:block}

  /* BRACKET */
  .conf-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif}
  .conf-header.east{background:linear-gradient(135deg,rgba(26,107,181,0.25),rgba(26,107,181,0.05));border:1px solid rgba(37,137,224,0.2)}
  .conf-header.west{background:linear-gradient(135deg,rgba(181,65,26,0.25),rgba(181,65,26,0.05));border:1px solid rgba(224,82,37,0.2)}
  .conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .conf-dot.east{background:var(--east2)}.conf-dot.west{background:var(--west2)}
  .conf-label{font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase}
  .conf-label.east{color:var(--east2)}.conf-label.west{color:var(--west2)}
  .round-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-left:4px;display:flex;align-items:center;gap:8px}
  .round-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .matchup-hint{font-size:10px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;margin-bottom:4px;padding-left:4px}
  .matchup{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;transition:border-color 0.2s}
  .matchup.has-winner{border-color:var(--border2)}
  .team-row{display:flex;align-items:center;padding:10px 12px;gap:10px;position:relative;transition:background 0.15s;min-height:52px}
  .team-row:first-child{border-bottom:1px solid var(--border)}
  .team-row.tappable{cursor:pointer}
  .team-row.tappable:active{background:var(--bg3)}
  .team-row.winner{background:rgba(26,122,60,0.15)}
  .team-row.winner .team-name{color:#5de088;font-weight:600}
  .team-row.winner .seed-badge{background:var(--win);color:#9effc0}
  .team-logo-wrap{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:50%;overflow:hidden;border:1.5px solid rgba(255,255,255,0.18)}
  .team-logo{width:50px;height:50px;object-fit:cover;display:block}
  .logo-placeholder{width:38px;height:38px;border-radius:50%;background:var(--bg4);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text3)}
  .seed-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3);border-radius:4px;padding:2px 5px;min-width:20px;text-align:center;flex-shrink:0}
  .team-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-name.empty{color:var(--text3);font-weight:400;font-size:14px}
  .wins-control{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
  .wbtn{width:30px;height:30px;background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;padding-bottom:1px}
  .wbtn:active{background:var(--bg4);color:var(--text)}
  .wins-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);min-width:22px;text-align:center}
  .wins-num.four{color:#5de088}
  .series-bar{display:flex;align-items:center;justify-content:center;padding:5px 12px;gap:6px;background:var(--bg3);font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif}
  .series-result{font-size:12px;font-weight:700;color:#5de088;background:rgba(26,122,60,0.25);padding:2px 8px;border-radius:4px}
  .pip-wrap{display:flex;gap:3px}
  .pip{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2)}
  .pip.filled-top{background:#5de088;border-color:#5de088}
  .pip.filled-bot{background:#e05225;border-color:#e05225}
  .finals-hero{text-align:center;padding:24px 16px 20px}
  .finals-trophy{font-size:52px;margin-bottom:8px;line-height:1;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4))}
  .finals-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);line-height:1}
  .finals-sub{font-size:12px;color:var(--text3);letter-spacing:1px;margin-top:4px;text-transform:uppercase}
  .champion-banner{background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.35);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:20px}
  .champion-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px}
  .champion-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--text)}
  .locked-notice{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}
  .locked-notice .icon{font-size:32px;margin-bottom:12px}

  /* LEADERBOARD */
  .lb-header{text-align:center;padding:20px 0 16px}
  .lb-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;color:#a78bfa}
  .lb-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
  .lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
  .lb-row.me{border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.06)}
  .lb-rank{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text3);min-width:28px;text-align:center}
  .lb-rank.gold{color:var(--gold)}.lb-rank.silver{color:#94a3b8}.lb-rank.bronze{color:#b87333}
  .lb-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;font-family:'Barlow Condensed',sans-serif;color:var(--text2);flex-shrink:0;font-weight:700}
  .lb-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--text)}
  .lb-pts{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#a78bfa;text-align:right}
  .lb-pts-label{font-size:10px;color:var(--text3);text-align:right}
  .lb-detail{font-size:11px;color:var(--text3);margin-top:1px}
  .lb-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}
  .lb-empty .icon{font-size:36px;margin-bottom:12px}

  /* ADMIN */
  .admin-header{text-align:center;padding:20px 0 16px}
  .admin-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;color:#fb923c}
  .admin-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
  .admin-notice{background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:#fb923c;margin-bottom:16px}
  .admin-tabs{display:flex;gap:8px;margin-bottom:16px}
  .admin-tab{flex:1;padding:9px 4px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);text-align:center;transition:all 0.2s}
  .admin-tab.on-east{background:rgba(37,137,224,0.15);border-color:rgba(37,137,224,0.3);color:var(--east2)}
  .admin-tab.on-west{background:rgba(224,82,37,0.15);border-color:rgba(224,82,37,0.3);color:var(--west2)}
  .admin-tab.on-finals{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.3);color:var(--gold)}
  .admin-save-btn{width:100%;background:#fb923c;color:#000;border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-top:8px}
  .admin-save-btn:active{background:#ea7716}

  /* OVERLAY */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .selector-sheet{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--border2);border-bottom:none;width:100%;max-width:500px;max-height:70vh;display:flex;flex-direction:column}
  .selector-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
  .selector-header{padding:12px 16px 10px;flex-shrink:0}
  .selector-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
  .selector-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .selector-divider{height:1px;background:var(--border);flex-shrink:0}
  .selector-list{overflow-y:auto;flex:1;padding:8px 0}
  .sel-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.1s}
  .sel-item:active{background:var(--bg3)}
  .sel-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--text)}
  .sel-conf{font-size:11px;color:var(--text3);margin-top:1px}
  .selector-close-btn{margin:12px 16px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-align:center;cursor:pointer;flex-shrink:0}
  .selector-close-btn:active{background:var(--bg4)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">NBA</div>
  <div class="login-title">NBAngs</div>
  <div class="login-sub">PLAYOFF BRACKET · 2024-25</div>
  <div class="login-card">
    <h3>Iniciar sesión</h3>
    <input class="login-input" id="email-input" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="pass-input" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" onclick="handleEmailLogin()">Entrar / Registrarse</button>
    <div class="divider"><span>o</span></div>
    <button class="btn-google" onclick="window._loginGoogle&&window._loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.1 30.1 0 24 0 14.6 0 6.7 5.6 2.7 13.7l7.8 6C12.3 13.5 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-2.8-.4-4H24v7.6h12.5c-.5 2.7-2.1 5-4.4 6.5l7 5.4c4-3.7 6.3-9.2 6.3-15.5z"/><path fill="#FBBC05" d="M10.5 28.3A14.6 14.6 0 0 1 9.5 24c0-1.5.3-2.9.7-4.3L2.4 13.7A24 24 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6.4z"/><path fill="#34A853" d="M24 48c6 0 11.1-2 14.8-5.4l-7-5.4c-2 1.3-4.5 2.1-7.8 2.1-6.3 0-11.6-4.2-13.5-10l-7.8 6.1C6.7 42.4 14.6 48 24 48z"/></svg>
      Continuar con Google
    </button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="header">
    <div class="header-logo">NBA</div>
    <div><div class="header-title">NBAngs</div><div class="header-sub">Playoff Bracket</div></div>
    <div class="header-user">
      <div class="user-avatar" id="user-avatar">👤</div>
      <button class="btn-logout" onclick="window._logout&&window._logout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active-east"  id="tab-east"        onclick="showPage('east')">🏀 Este</div>
    <div class="tab"              id="tab-west"        onclick="showPage('west')">🏀 Oeste</div>
    <div class="tab"              id="tab-finals"      onclick="showPage('finals')">🏆 Finals</div>

let S  = freshState();   // user predictions

// ── AUTH ─────────────────────────────────────────────────────────────
function isAdmin(){ return window._fbUser&&window._fbUser.email===ADMIN_EMAIL; }

function flashSave(msg){

function saveResults(){

}

// ── BRACKET LOGIC ────────────────────────────────────────────────────
function winner(m){ if(m.w[0]===4)return 0; if(m.w[1]===4)return 1; return null; }

function propagateState(st){
  ['east','west'].forEach(conf=>{
    const c=st[conf];
    [0,1].forEach(p=>{
      const s0=c.r1[p*2],s1=c.r1[p*2+1];
      const w0=winner(s0),w1=winner(s1);
      const dst=c.r2[p];
      const p0=dst.t[0]?dst.t[0].id:null,p1=dst.t[1]?dst.t[1].id:null;
      dst.t[0]=w0!==null?{...s0.t[w0]}:null;
      dst.t[1]=w1!==null?{...s1.t[w1]}:null;
      if(dst.t[0]&&p0!==dst.t[0].id)dst.w[0]=0;
      if(dst.t[1]&&p1!==dst.t[1].id)dst.w[1]=0;
    });
    const wr0=winner(c.r2[0]),wr1=winner(c.r2[1]);
    const d3=c.r3[0];
    const pp0=d3.t[0]?d3.t[0].id:null,pp1=d3.t[1]?d3.t[1].id:null;
    d3.t[0]=wr0!==null?{...c.r2[0].t[wr0]}:null;
    d3.t[1]=wr1!==null?{...c.r2[1].t[wr1]}:null;
    if(d3.t[0]&&pp0!==d3.t[0].id)d3.w[0]=0;
    if(d3.t[1]&&pp1!==d3.t[1].id)d3.w[1]=0;
  });
  const ew=winner(st.east.r3[0]),ww=winner(st.west.r3[0]);
  const fp0=st.finals.t[0]?st.finals.t[0].id:null,fp1=st.finals.t[1]?st.finals.t[1].id:null;
  st.finals.t[0]=ew!==null?{...st.east.r3[0].t[ew]}:null;
  st.finals.t[1]=ww!==null?{...st.west.r3[0].t[ww]}:null;
  if(st.finals.t[0]&&fp0!==st.finals.t[0].id)st.finals.w[0]=0;
  if(st.finals.t[1]&&fp1!==st.finals.t[1].id)st.finals.w[1]=0;
}

// ── SCORING ──────────────────────────────────────────────────────────
function allPaths(){
  const p=[];
  ['east','west'].forEach(c=>{ for(let i=0;i<4;i++)p.push(`${c}:r1:${i}`); for(let i=0;i<2;i++)p.push(`${c}:r2:${i}`); p.push(`${c}:r3:0`); });
  p.push('finals');
  return p;
}

function matchOf(st,path){
  if(path==='finals')return st.finals;
  const[c,r,i]=path.split(':'); return st[c][r][+i];
}

function calcScore(pred,real){
  let pts=0,correct=0,exact=0;
  allPaths().forEach(path=>{
    const pm=matchOf(pred,path), rm=matchOf(real,path);
    const rw=winner(rm); if(rw===null)return;
    const pw=winner(pm); if(pw===null)return;
    if(!rm.t[rw]||!pm.t[pw])return;
    if(pm.t[pw].id===rm.t[rw].id){
      correct++;
      if(pm.w[1-pw]===rm.w[1-rw]){exact++;pts+=2;}
      else pts+=1;
    }
  });
  return {pts,correct,exact};
}

// ── DOM HELPERS ──────────────────────────────────────────────────────
const mKey=(path,mode)=>`${mode}-match-${path.replace(/:/g,'-')}`;
const rKey=(path,ti,mode)=>`${mKey(path,mode)}-r${ti}`;

function pipsHtml(w0,w1){
  let h='<div class="pip-wrap">';
  for(let i=0;i<4;i++)h+=`<div class="pip${i<w0?' filled-top':''}"></div>`;
  h+=`</div><span style="font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif">${w0}-${w1}</span><div class="pip-wrap">`;
  for(let i=0;i<4;i++)h+=`<div class="pip${i<w1?' filled-bot':''}"></div>`;
  return h+'</div>';
}

function logoHtml(id,sz){
  if(!id)return`<div class="logo-placeholder">?</div>`;
  const b='LOGOS/'+LOGO_MAP[id],is=Math.round(sz*1.6);
  return `<div class="team-logo-wrap" data-logoid="${id}" style="width:${sz}px;height:${sz}px"><img class="team-logo" src="${b}.png" width="${is}" height="${is}" style="width:${is}px;height:${is}px;object-fit:cover;display:block" onerror="tryNextExt(this,'${b}',0)"></div>`;
}

function rowHtml(team,ti,path,canSel,wins,isWin,hasT,mode){
  const logo=team?logoHtml(team.id,28):`<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
  const seed=team?`<span class="seed-badge">${team.seed||''}</span>`:`<span class="seed-badge" style="opacity:.4">—</span>`;
  const name=team?`<span class="team-name">${team.short}</span>`:`<span class="team-name empty">${canSel?'Elegir':'Por definir'}</span>`;
  const ctrl=!hasT?'':
    `<div class="wins-control" onclick="event.stopPropagation()">
      <button class="wbtn" onclick="setW('${path}',${ti},-1,'${mode}')">−</button>
      <span class="wins-num${wins===4?' four':''}">${wins}</span>
      <button class="wbtn" onclick="setW('${path}',${ti},1,'${mode}')">+</button>
    </div>`;
  const tap=canSel?`onclick="openSel('${path}',${ti},'${mode}')"`:''
  return `<div class="team-row${isWin?' winner':''}${canSel?' tappable':''}" data-rk="${rKey(path,ti,mode)}" ${tap}>${logo}${seed}${name}${ctrl}</div>`;
}

function matchHtml(m,path,canSel,mode){
  const w=winner(m),hasT=!!(m.t[0]&&m.t[1]);
  let bar='';
  if(w!==null) bar=`<div class="series-bar" data-bar="${mode}-${path}"><span class="series-result">FINAL 4-${m.w[1-w]}</span></div>`;
  else if(hasT&&(m.w[0]>0||m.w[1]>0)) bar=`<div class="series-bar" data-bar="${mode}-${path}">${pipsHtml(m.w[0],m.w[1])}</div>`;
  else bar=`<div class="series-bar" data-bar="${mode}-${path}" style="display:none"></div>`;
  return `<div class="matchup${w!==null?' has-winner':''}" data-mk="${mKey(path,mode)}">
    ${rowHtml(m.t[0],0,path,canSel,m.w[0],w===0,hasT,mode)}
    ${rowHtml(m.t[1],1,path,canSel,m.w[1],w===1,hasT,mode)}
    ${bar}
  </div>`;
}

function confHtml(conf,mode){
  const st=mode==='admin'?RS:S, c=st[conf];
  const col=conf==='east'?'east':'west', lbl=conf==='east'?'Este':'Oeste';
  let h=`<div class="conf-header ${col}"><div class="conf-dot ${col}"></div><div class="conf-label ${col}">Conferencia ${lbl}</div></div>`;
  h+=`<div class="round-label">Primera Ronda</div>`;
  [0,1,2,3].forEach(i=>h+=matchHtml(c.r1[i],`${conf}:r1:${i}`,true,mode));
  h+=`<div class="round-label">Semifinal de Conferencia</div>`;
  h+=`<div class="matchup-hint">Gan. 1vs8 — Gan. 4vs5</div>`;
  h+=matchHtml(c.r2[0],`${conf}:r2:0`,false,mode);
  h+=`<div class="matchup-hint">Gan. 2vs7 — Gan. 3vs6</div>`;
  h+=matchHtml(c.r2[1],`${conf}:r2:1`,false,mode);
  h+=`<div class="round-label">Final de Conferencia</div>`;
  h+=matchHtml(c.r3[0],`${conf}:r3:0`,false,mode);
  return h;
}

function finalsHtml(mode){
  const st=mode==='admin'?RS:S, m=st.finals, w=winner(m), champ=w!==null?m.t[w]:null;
  let h=`<div class="finals-hero"><div class="finals-trophy">🏆</div><div class="finals-title">NBA Finals</div><div class="finals-sub">The Finals · NBA Championship</div></div>`;
  h+=`<div id="champ-wrap-${mode}">`;
  if(champ) h+=`<div class="champion-banner"><div class="champion-label">🏆 CAMPEÓN NBA</div><div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">${logoHtml(champ.id,54)}<div class="champion-name">${champ.name}</div></div></div>`;
  h+=`</div>`;
  if(!m.t[0]||!m.t[1]) h+=`<div class="locked-notice"><div class="icon">🔒</div><div>Completa las Finales de Conferencia</div></div>`;
  h+=`<div class="round-label">Gran Final</div>`;
  h+=matchHtml(m,'finals',false,mode);
  return h;
}

// ── PATCH ────────────────────────────────────────────────────────────
function patchRow(el,m,ti,path,canSel,w,mode){
  if(!el)return;
  const team=m.t[ti],isWin=w===ti,hasT=!!(m.t[0]&&m.t[1]),wins=m.w[ti];
  el.className='team-row'+(isWin?' winner':'')+(canSel?' tappable':'');
  const wrap=el.querySelector('.team-logo-wrap');
  if(wrap&&wrap.dataset.logoid!==(team?team.id:'')){
    wrap.outerHTML=team?logoHtml(team.id,28):`<div class="team-logo-wrap"><div class="logo-placeholder">?</div></div>`;
  }
  const sEl=el.querySelector('.seed-badge');
  if(sEl){sEl.textContent=team?(team.seed||''):'—';sEl.style.opacity=team?'':'0.4';}
  const nEl=el.querySelector('.team-name');
  if(nEl){nEl.textContent=team?team.short:(canSel?'Elegir':'Por definir');nEl.className='team-name'+(team?'':' empty');}
  let ctrl=el.querySelector('.wins-control');
  if(hasT){
    if(!ctrl){
      el.insertAdjacentHTML('beforeend',`<div class="wins-control" onclick="event.stopPropagation()"><button class="wbtn" onclick="setW('${path}',${ti},-1,'${mode}')">−</button><span class="wins-num">0</span><button class="wbtn" onclick="setW('${path}',${ti},1,'${mode}')">+</button></div>`);
      ctrl=el.querySelector('.wins-control');
    }
    ctrl.style.display='';
    const n=ctrl.querySelector('.wins-num');
    n.textContent=wins; n.className='wins-num'+(wins===4?' four':'');
  } else if(ctrl) ctrl.style.display='none';
}

function patchMatch(con,m,path,canSel,mode){
  const w=winner(m);
  [0,1].forEach(ti=>{
    const el=con.querySelector(`[data-rk="${rKey(path,ti,mode)}"]`);
    patchRow(el,m,ti,path,canSel,w,mode);
  });
  const bar=con.querySelector(`[data-bar="${mode}-${path}"]`);
  if(bar){
    const hasT=!!(m.t[0]&&m.t[1]);
    if(w!==null){bar.style.display='';bar.innerHTML=`<span class="series-result">FINAL 4-${m.w[1-w]}</span>`;}
    else if(hasT&&(m.w[0]>0||m.w[1]>0)){bar.style.display='';bar.innerHTML=pipsHtml(m.w[0],m.w[1]);}
    else bar.style.display='none';
  }
  const mEl=con.querySelector(`[data-mk="${mKey(path,mode)}"]`);
  if(mEl)mEl.classList.toggle('has-winner',w!==null);
}

function updateChamp(con,st,mode){
  const w=winner(st.finals),champ=w!==null?st.finals.t[w]:null;
  const bEl=con.querySelector(`#champ-wrap-${mode}`);
  if(bEl){
    if(champ)bEl.innerHTML=`<div class="champion-banner"><div class="champion-label">🏆 CAMPEÓN NBA</div><div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px">${logoHtml(champ.id,54)}<div class="champion-name">${champ.name}</div></div></div>`;
    else bEl.innerHTML='';
  }
  const ln=con.querySelector('.locked-notice');
  if(ln)ln.style.display=(st.finals.t[0]&&st.finals.t[1])?'none':'block';
}

function renderAll(){
  ['east','west'].forEach(conf=>{
    if(pagesBuilt[conf]){
      const con=document.getElementById('page-'+conf);
      const c=S[conf];
      c.r1.forEach((m,i)=>patchMatch(con,m,`${conf}:r1:${i}`,true,'bracket'));
      c.r2.forEach((m,i)=>patchMatch(con,m,`${conf}:r2:${i}`,false,'bracket'));
      patchMatch(con,c.r3[0],`${conf}:r3:0`,false,'bracket');
    }
  });
  if(pagesBuilt.finals){
    const con=document.getElementById('page-finals');
    patchMatch(con,S.finals,'finals',false,'bracket');
    updateChamp(con,S,'bracket');
  }
  if(pagesBuilt.admin&&isAdmin()){
    const con=document.getElementById('page-admin');
    ['east','west'].forEach(conf=>{
      const c=RS[conf];
      c.r1.forEach((m,i)=>patchMatch(con,m,`${conf}:r1:${i}`,true,'admin'));
      c.r2.forEach((m,i)=>patchMatch(con,m,`${conf}:r2:${i}`,false,'admin'));
      patchMatch(con,c.r3[0],`${conf}:r3:0`,false,'admin');
    });
    patchMatch(con,RS.finals,'finals',false,'admin');
    updateChamp(con,RS,'admin');
  }
}

function setW(path,ti,delta,mode){
  const st=mode==='admin'?RS:S;
  const m=path==='finals'?st.finals:(()=>{const[c,r,i]=path.split(':');return st[c][r][+i];})();
  if(!m.t[ti])return;
  m.w[ti]=Math.max(0,Math.min(4,m.w[ti]+delta));
  if(m.w[ti]===4)m.w[1-ti]=Math.min(m.w[1-ti],3);
  if(mode==='admin')propagateState(RS);
  else{propagateState(S);scheduleSave();}
  renderAll();
}

// ── LEADERBOARD ──────────────────────────────────────────────────────
function renderLeaderboard(){
  const con=document.getElementById('page-leaderboard');
  if(!con)return;
  const real=window._results, allB=window._allBrackets||{}, allU=window._allUsers||{};
  const myUid=window._fbUser?window._fbUser.uid:null;
  let h=`<div class="lb-header"><div class="lb-title">🏅 Tabla de Puntos</div><div class="lb-sub">1pt ganador correcto · 2pt ganador + resultado exacto</div></div>`;
  if(!real||!Object.keys(allB).length){
    h+=`<div class="lb-empty"><div class="icon">⏳</div>Aún no hay resultados cargados o nadie completó su bracket.</div>`;
    con.innerHTML=h; return;
  }
  const rows=Object.keys(allB).map(uid=>{
    const u=allU[uid]||{};
    const sc=calcScore(allB[uid],real);
    return{uid,name:u.name||u.email||'Usuario',...sc};
  }).sort((a,b)=>b.pts-a.pts||b.correct-a.correct||b.exact-a.exact);
  rows.forEach((row,i)=>{
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const ri=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const me=row.uid===myUid;
    h+=`<div class="lb-row${me?' me':''}">
      <div class="lb-rank ${rc}">${ri}</div>
      <div class="lb-avatar">${row.name[0].toUpperCase()}</div>
      <div style="flex:1">
        <div class="lb-name">${row.name}${me?' <span style="font-size:10px;color:var(--text3)">(vos)</span>':''}</div>
        <div class="lb-detail">${row.correct} series acertadas · ${row.exact} resultados exactos</div>
      </div>
      <div><div class="lb-pts">${row.pts}</div><div class="lb-pts-label">pts</div></div>
    </div>`;
  });
  con.innerHTML=h;
}

// ── ADMIN ────────────────────────────────────────────────────────────
function buildAdminPage(){
  let h=`<div class="admin-header"><div class="admin-title">⚙️ Resultados Reales</div><div class="admin-sub">Solo visible para el admin</div></div>
  <div class="admin-notice">⚠️ Cargá cómo terminaron realmente las series y guardá.</div>
  <div class="admin-tabs">
    <div class="admin-tab on-east" id="at-aeast" onclick="adminTab('aeast')">🏀 Este</div>
    <div class="admin-tab"        id="at-awest" onclick="adminTab('awest')">🏀 Oeste</div>
    <div class="admin-tab"        id="at-afinals" onclick="adminTab('afinals')">🏆 Finals</div>
  </div>
  <div id="adm-aeast">${confHtml('east','admin')}</div>
  <div id="adm-awest"  style="display:none">${confHtml('west','admin')}</div>
  <div id="adm-afinals" style="display:none">${finalsHtml('admin')}</div>
  <button class="admin-save-btn" onclick="saveResults()">💾 GUARDAR RESULTADOS</button>`;
  return h;
}

let _admTab='aeast';
function adminTab(tab){
  _admTab=tab;
  ['aeast','awest','afinals'].forEach(t=>{
    const el=document.getElementById('adm-'+t); if(el)el.style.display=t===tab?'':'none';
    const btn=document.getElementById('at-'+t); if(!btn)return;
    btn.className='admin-tab'+(t===tab?(' on-'+(t==='aeast'?'east':t==='awest'?'west':'finals')):'');
  });
}

// ── PAGES ────────────────────────────────────────────────────────────
function ensurePageBuilt(p){
  if(pagesBuilt[p])return;
  if(p==='east') document.getElementById('page-east').innerHTML=confHtml('east','bracket');
  else if(p==='west') document.getElementById('page-west').innerHTML=confHtml('west','bracket');
  else if(p==='finals') document.getElementById('page-finals').innerHTML=finalsHtml('bracket');
  else if(p==='leaderboard') renderLeaderboard();
  else if(p==='admin'&&isAdmin()){
    // Pre-load real results into RS if available
    if(window._results){ try{RS=JSON.parse(JSON.stringify(window._results));propagateState(RS);}catch(e){} }
    document.getElementById('page-admin').innerHTML=buildAdminPage();
  }
  pagesBuilt[p]=true;
}

function showPage(p){
  if(p==='admin'&&!isAdmin())return;
  ['east','west','finals','leaderboard','admin'].forEach(id=>{
    document.getElementById('page-'+id).classList.toggle('active',id===p);
    const t=document.getElementById('tab-'+id);
    if(t){t.className='tab';if(id===p)t.classList.add('active-'+id);}
  });
  window._currentTab=p;
  ensurePageBuilt(p);
  if(p==='leaderboard')renderLeaderboard();
  else renderAll();
}

// ── SELECTOR ─────────────────────────────────────────────────────────
function openSel(path,ti,mode){
  selCtx={path,ti}; selMode=mode;
  const[conf]=path.split(':');
  const teams=TEAMS.filter(t=>t.conf===(conf==='east'?'East':'West'));
  document.getElementById('sel-title').textContent='Elegir equipo';
  document.getElementById('sel-sub').textContent=conf==='east'?'Conferencia Este':'Conferencia Oeste';
  let h='';
  teams.forEach(t=>{ h+=`<div class="sel-item" onclick="pickTeam('${t.id}')">${logoHtml(t.id,28)}<div><div class="sel-name">${t.name}</div><div class="sel-conf">${t.conf}</div></div></div>`; });
  document.getElementById('sel-list').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); selCtx=null; }
function overlayClick(e){ if(e.target===document.getElementById('overlay'))closeOverlay(); }
function pickTeam(id){
  if(!selCtx)return;
  const t=TEAMS.find(x=>x.id===id);
  const{path,ti}=selCtx; const[conf,round,mi]=path.split(':');
  const st=selMode==='admin'?RS:S;
  const m=st[conf][round][+mi];
  m.t[ti]={...t,seed:m.t[ti]?.seed||''}; m.w[ti]=0;
  if(selMode==='admin')propagateState(RS);
  else{propagateState(S);scheduleSave();}
  closeOverlay(); renderAll();
}

window.tryNextExt=function(img,base,idx){
  const exts=['png','jpg','jpeg','webp','svg'],next=idx+1;
  if(next<exts.length){img.onerror=()=>tryNextExt(img,base,next);img.src=base+'.'+exts[next];}
  else{img.style.display='none';const ph=document.createElement('div');ph.className='logo-placeholder';ph.textContent=base.split('/').pop().substring(0,3);img.parentNode.replaceChild(ph,img);}
};

// Init
propagateState(S);
</script>
</body>
</html>
